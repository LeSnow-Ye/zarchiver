# zarchiver configuration example.
#
# Copy this file to `config.toml` and edit. `config.toml` is gitignored so your
# secrets and local paths stay out of version control.
#
# Secrets can also be supplied via environment variables, which override values
# here:
#   DEEPSEEK_API_KEY      -> ai.api_key
#   ZHIHU_COOKIE          -> browser.cookie_string
#   ZARCHIVER_VAULT       -> obsidian.vault_path
#   ZARCHIVER_DB          -> archive.db_path
#   ZARCHIVER_ASSETS_ROOT -> archive.assets_root
#   ZARCHIVER_AUTO_EXPORT -> archive.auto_export (comma-separated, e.g. "obsidian,html")
#   ZARCHIVER_VIDEO_QUALITY -> archive.video_quality (FHD|HD|SD|LD)
#   ZARCHIVER_MAX_ASSET_MB -> archive.max_asset_mb (number; 0 disables the limit)
#   ZARCHIVER_MAX_ASSET_RETRIES -> archive.max_asset_retries (integer; 0 disables retries)
#   ZARCHIVER_PREFER_API_CONTENT -> archive.prefer_api_content ("1"/"true"/"0"/"false")
#   ZARCHIVER_HEADLESS    -> browser.headless ("1"/"true" to force headless)

[archive]
# The database is the system of record: full content, comments, AI results, and
# the image asset map all live here. Exporters render from it.
db_path = "zarchiver.db"
# Root directory for downloaded images. Each item gets its own subdirectory
# (one per item key); the DB records the relative path to each image.
assets_root = "archive/assets"
# Exporters to run automatically after `archive` ingests an item. Set to an
# empty list ([]) to ingest only, then run `zarchiver export` later.
auto_export = ["obsidian", "html"]
# What to do when an item was already archived (matched by content hash in the
# DB): "skip", "update", or "ask".
on_duplicate = "skip"
# Record comments on archived content (root + child replies).
comments = true
# Max comments to record per item, counting child replies (0 = unlimited).
# Popular content can have thousands, so the default is capped.
max_comments = 150
# Download embedded videos (<a class="video-box">) as MP4 files so they play
# offline. Turn off to keep just a poster image + link (saves space/bandwidth).
download_videos = true
# Preferred video quality when downloading: FHD | HD | SD | LD. Falls back to
# the nearest available. FHD can be tens of MB per video.
video_quality = "FHD"
# Maximum size (MB) for a single downloaded asset (image or video). Assets
# larger than this aren't stored locally — the content keeps the original
# remote link instead. Set 0 to disable the limit and archive everything.
max_asset_mb = 20.0
# Retries after the first attempt for transient asset download failures:
# timeouts, transport errors, HTTP 429, and HTTP 5xx. Permanent 4xx failures
# and over-size skips are never retried. Set 0 for a single attempt.
max_asset_retries = 2
# In batch archives (collection/column/question), build each item directly from
# the listing API's JSON (which already contains the full body) instead of
# opening its page — much faster, and lets duplicate detection happen up front.
# Pages are still opened as a fallback when an API entry lacks usable content.
# Set false to force the old "open every page" behavior.
prefer_api_content = true

[browser]
# On a real headless server, run the CLI under `xvfb-run`.
headless = true
locale = "zh-CN"
# Persistent login state saved by `zarchiver login`. Gitignored.
storage_state = "storage_state.json"
# Fallback for headless/server use: paste an exported cookie string here
# (or set ZHIHU_COOKIE). Leave empty to use the login flow instead.
cookie_string = ""
nav_timeout_ms = 40000
# Polite randomized delay between items in a batch (milliseconds).
min_delay_ms = 0 # 1000
max_delay_ms = 0 # 5000
# Cap items pulled from a collection/column per run (0 = unlimited).
max_items = 0

[obsidian]
enabled = true
vault_path = "vault"
folder = "Zhihu"
# Assets folder for non-batch archives. Batch items keep assets self-contained
# in <folder>/<batch>/assets instead.
assets_folder = "Zhihu/assets"
# Copy locally-stored images into the vault on export (images are downloaded
# once at ingest into archive.assets_root; this just controls whether the note
# references local copies or keeps remote URLs).
download_images = true
# Available fields: {title} {author} {source_id} {content_type} {date}
filename_template = "{title} - {author}"
# For batch archives (collection/column/question), group items into a
# subdirectory named after the batch (e.g. Zhihu/<column title>/). Override
# per run with --subdir.
batch_subdirs = true
# Optional: drive the Obsidian desktop app via its CLI. Requires the app to be
# running, so it does not work headless. Off by default.
use_cli = false
cli_vault_name = ""

[html]
enabled = true
output_path = "archive/html"
# Inline images as base64 for fully self-contained HTML files (read from the
# locally stored assets; no network access at export time).
embed_images = false
# Mirror Obsidian: batch archives go in a subdirectory named after the batch.
batch_subdirs = true

[ai]
enabled = true
provider = "deepseek"
base_url = "https://api.deepseek.com"
# Prefer the DEEPSEEK_API_KEY env var over putting the key here.
api_key = ""
model = "deepseek-v4-flash"
# deepseek-v4-flash is a reasoning model; keep max_tokens generous.
max_tokens = 2048
temperature = 0.2
# Set to 0 to disable input truncation (Recommended)
max_input_chars = 0 # 20000
timeout_s = 120
# Language for summaries/tags: "zh" or "en".
language = "zh"
# Optional reference taxonomy for the `category` field:
#   - Empty (default): the AI free-generates a category each time. Use this for
#     the first pass over a fresh archive.
#   - Non-empty: the AI prefers the closest match from your list, which keeps
#     categories from fragmenting into many near-duplicate labels.
# Categories are corpus-specific, so build your OWN list (see docs/categories.md):
#   1. archive a batch with this left empty (free generation),
#   2. uv run python scripts/category_stats.py -o category_stats.md
#   3. paste that output into an AI with the prompt in docs/categories.md,
#   4. drop the result here as a TOML multi-line string, e.g.:
#        category_reference = """
#        - 计算机图形学与渲染
#        - 游戏开发
#        - 数学
#        """
category_reference = ""
