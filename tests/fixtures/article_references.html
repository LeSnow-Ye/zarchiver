,"badgeV2":{"title":"正经文章都在博客, 不发知乎. 注意甄别. ","mergedBadges":[],"detailBadges":[],"icon":"","nightIcon":""},"exposedMedal":{"medalId":"0","medalName":"","avatarUrl":"","miniAvatarUrl":"","description":"","medalAvatarFrame":null}},"commentPermission":"all","copyrightPermission":"need_review","state":"published","ipInfo":"江西","imageWidth":0,"imageHeight":0,"content":"\u003Cp data-pid=\"-dlv_-uu\"\u003E起因是证明助理 (以下简称 PA) Lean4 的首席架构师兼联合创始人 \u003Csup data-text=\"此称呼的来源见\" data-url=\"https:\u002F\u002Flean-lang.org\u002Ffro\u002Fteam\u002F\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"1\"\u003E[1]\u003C\u002Fsup\u003E Leonardo de Moura (以下简称 Leo) 于 2026 年 3 月16日 发了一篇博客 \u003Ca href=\"https:\u002F\u002Flink.zhihu.com\u002F?target=https%3A\u002F\u002Fleodemoura.github.io\u002Fblog\u002F2026-3-16-who-watches-the-provers\u002F\" class=\" wrap external\" target=\"_blank\" rel=\"nofollow noreferrer\"\u003EWho Watches the Provers?\u003C\u002Fa\u003E\u003C\u002Fp\u003E\u003Ca href=\"https:\u002F\u002Flink.zhihu.com\u002F?target=https%3A\u002F\u002Fleodemoura.github.io\u002Fblog\u002F2026-3-16-who-watches-the-provers\u002F\" data-draft-node=\"block\" data-draft-type=\"link-card\" data-draft-title=\"https:\u002F\u002Fleodemoura.github.io\u002Fblog\u002F2026-3-16-who-watches-the-provers\u002F\" data-draft-cover=\"\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"\u003E\u003Cspan class=\"invisible\"\u003Ehttps:\u002F\u002F\u003C\u002Fspan\u003E\u003Cspan class=\"visible\"\u003Eleodemoura.github.io\u002Fbl\u003C\u002Fspan\u003E\u003Cspan class=\"invisible\"\u003Eog\u002F2026-3-16-who-watches-the-provers\u002F\u003C\u002Fspan\u003E\u003Cspan class=\"ellipsis\"\u003E\u003C\u002Fspan\u003E\u003C\u002Fa\u003E\u003Cp data-pid=\"g1EHVfnT\"\u003E这篇博客因为措辞和叙事问题在社交平台引起了有关专家激烈的讨论. 如 \u003Csup data-text=\"来源\" data-url=\"https:\u002F\u002Fmamot.fr\u002F@gallais\u002F116246413165405273\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"2\"\u003E[2]\u003C\u002Fsup\u003E\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpic3.zhimg.com\u002Fv2-b6ce3eb0c2df8cce0de12735a22b5a42_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1195\" data-rawheight=\"861\" data-original-token=\"v2-b29dc01680270b61b7a06ea7ccbe0ac1\" class=\"origin_image zh-lightbox-thumb\" width=\"1195\" data-original=\"https:\u002F\u002Fpic3.zhimg.com\u002Fv2-b6ce3eb0c2df8cce0de12735a22b5a42_r.jpg\"\u002F\u003E\u003Cfigcaption\u003Ehttps:\u002F\u002Fmamot.fr\u002F@gallais\u002F116246413165405273\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cblockquote data-pid=\"SWYkDSCE\"\u003ELeonardo de Moura: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EFinding a proof is hard — sophisticated tools, heuristics, AI, all impossible to fully audit. But none of it needs to be trusted. A proof tool doesn&#39;t assert that a theorem is true. It produces a certificate — a detailed formal artifact — which is then independently verified by a small, simple program called the kernel or proof checker.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EThe kernel is like an autograder on a math exam: the student&#39;s work can be as creative, messy, or AI-assisted as they like; what matters is whether the answer checks out. The kernel doesn&#39;t know how to solve problems. It only knows how to verify solutions. And because verification is a much simpler task than discovery, the kernel can be small enough to inspect and audit.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EBut what if even that small kernel has a bug?\u003Cbr\u002F\u003E\u003Cbr\u002F\u003E\u003Cb\u003ELean is designed so that \u003Ci\u003Eanyone \u003C\u002Fi\u003Ecan build independent kernels. \u003C\u002Fb\u003EDifferent teams, using different programming languages, running on different hardware. This is not hypothetical. It has already caught real bugs.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EAn LLM or a malicious user exploiting a bug in one kernel would need to exploit the \u003Ci\u003Esame \u003C\u002Fi\u003Ebug in all of them simultaneously. That is a fundamentally harder problem.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EG. Allais: \u003Cb\u003EAs if the idea of kernels did not predate Lean. As if the idea of having multiple different kernels check the same proof object did not predate Lean.\u003C\u002Fb\u003E\u003C\u002Fblockquote\u003E\u003Cp class=\"ztext-empty-paragraph\"\u003E\u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"SWDUO9ot\"\u003ELeonardo de Moura: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EMultiple kernels also let us innovate \u003Cb\u003Ewithout fear\u003C\u002Fb\u003E. We can implement a new optimization or an entirely new architecture in a new kernel, test it aggressively, and know that the other kernels will catch any mistake in the new one. The diversity is not just a safety net. It is what makes rapid progress possible.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EG. Allais: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EAs if Lean did not have bugs (of course they&#39;re declared to be &#34;theoretical&#34; &amp; therefore not bugs of interest). \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EA blog post that states multiple times that testing cannot discover bugs that are in weird corners but also that conformance testing means we can innovate quickly and \u003Cb\u003Ewithout fear\u003C\u002Fb\u003E.\u003C\u002Fblockquote\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpica.zhimg.com\u002Fv2-791af122f4ef2f4cc0acddae9de242b0_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1193\" data-rawheight=\"522\" data-original-token=\"v2-ba724faa8e9b1c285e5387b729396f5d\" class=\"origin_image zh-lightbox-thumb\" width=\"1193\" data-original=\"https:\u002F\u002Fpica.zhimg.com\u002Fv2-791af122f4ef2f4cc0acddae9de242b0_r.jpg\"\u002F\u003E\u003Cfigcaption\u003EJon Sterling: 我宣佈, Leo 是個笨蛋!\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"dKt7226M\"\u003E\u003Cbr\u002F\u003E\u003Cbr\u002F\u003E数个月前的一天 \u003Csup data-text=\"2025年9月26日\" data-url=\"\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"3\"\u003E[3]\u003C\u002Fsup\u003E, 证明助理 \u003Ca href=\"https:\u002F\u002Flink.zhihu.com\u002F?target=https%3A\u002F\u002Fredprl.org\u002F\" class=\" wrap external\" target=\"_blank\" rel=\"nofollow noreferrer\"\u003ERedPRL\u003C\u002Fa\u003E 主要设计者 Jon Sterling 在其当日的 \u003Ca href=\"https:\u002F\u002Flink.zhihu.com\u002F?target=https%3A\u002F\u002Fwww.jonmsterling.com\u002Fbafkrmibw62exzxbkwlysbe36aydpjsulyjnb6ih3oaoqbvhga4tg44z3zi.pdf\" class=\" wrap external\" target=\"_blank\" rel=\"nofollow noreferrer\"\u003E演讲材料\u003C\u002Fa\u003E \u003Csup data-text=\"油管\" data-url=\"https:\u002F\u002Fwww.youtube.com\u002Fwatch?v=7oBkEbKJvnE\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"4\"\u003E[4]\u003C\u002Fsup\u003E \u003Ci\u003EIs it time for a new proof assistant?\u003C\u002Fi\u003E 中总结了过去数年间各大 PA 团队和社区存在的问题, 也包括 Lean. 彼时, 尽管他指出 Lean4 社区的炒作风气属于事实, 但对于此项目整体仍是正面评价, 他实际上毫不留情地指出了更多 Agda \u003Csup data-text=\"也是证明助理之一\" data-url=\"https:\u002F\u002Fwiki.portal.chalmers.se\u002Fagda\u002Fpmwiki.php\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"5\"\u003E[5]\u003C\u002Fsup\u003E 的不良方面. \u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-b0027a04a2af4977d96fe2e4dd7ce375_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1414\" data-rawheight=\"993\" data-original-token=\"v2-0e81994fa952805fdc06309f1ce90e7c\" class=\"origin_image zh-lightbox-thumb\" width=\"1414\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-b0027a04a2af4977d96fe2e4dd7ce375_r.jpg\"\u002F\u003E\u003Cfigcaption\u003E来源: Jon Sterling 演讲用的 Slide\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-d453fa65b5f2a1d5d23f8c454cc075ef_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1401\" data-rawheight=\"1006\" data-original-token=\"v2-fb0755ab8f0785bc84c12156f9005e5f\" class=\"origin_image zh-lightbox-thumb\" width=\"1401\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-d453fa65b5f2a1d5d23f8c454cc075ef_r.jpg\"\u002F\u003E\u003Cfigcaption\u003E来源: Jon Sterling 演讲用的 Slide. 其中第 5 点正是在内涵 Agda. \u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"0FLnd8uQ\"\u003E在 Leonardo de Moura 发送那篇博客之后, Jon Sterling 对此评价颇多 \u003Csup data-text=\"来源\" data-url=\"https:\u002F\u002Fmathstodon.xyz\u002F@jonmsterling\u002F116246695464035143\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"6\"\u003E[6]\u003C\u002Fsup\u003E: \u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"gpDlKKWs\"\u003E\u003Cb\u003ERegarding Leo’s post, it was in poor taste but no poorer than anyone who knows him has come to expect.\u003C\u002Fb\u003E My comment is that I bet \u003Cb\u003ELean is inconsistent too.\u003C\u002Fb\u003E I don’t know exactly where and how, all I am saying is that I don’t doubt it. These are very sophisticated pieces of software. \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EIn fact, I don’t doubt that those working in the trenches of the FRO could point to some dark corners and examples of unpublicised sources of inconsistency. \u003Cbr\u002F\u003E\u003Cbr\u002F\u003E\u003Cb\u003EThis isn’t to dunk on Lean. \u003C\u002Fb\u003EBugs can happen, and having a small kernel is a good way to limit their scope! But there are many ways for assurances to fail and this can happen inside and outside the kernel.\u003C\u002Fblockquote\u003E\u003Cp class=\"ztext-empty-paragraph\"\u003E\u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"TcNPkzgm\"\u003EI am also not too impressed by the existence of second-party checkers in the context of a language that lacks decidable type checking. Because something has to give, these checkers will be (necessarily) incomplete in one way or another, most likely each in different ways. This is because lean’s failure of completeness of conversion almost certainly manifests in heuristic ways that are not predictable or replicable…\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EFor a fail safe checker to provide confidence, it needs to be complete. This is not possible with Lean’s core language as designed, and it will not be possible for Lean itself until they find new leadership.\u003C\u002Fblockquote\u003E\u003Cp class=\"ztext-empty-paragraph\"\u003E\u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"urqtN8Kf\"\u003EI am very glad the “light of Claude” is shining on Rocq. I hope the Rocq team is learning some lessons and it sounds like they are.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EAgda is safe because it has not aimed to be consistent in many years, if ever.  ;-)\u003C\u002Fblockquote\u003E\u003Cp class=\"ztext-empty-paragraph\"\u003E\u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"wZHocE5q\"\u003EThe de bruijn criterion remains a very good idea for systems that are decidable, or undecidable systems that produce full derivations. The latter is not practical for a full type theory, so nobody does it. So in practice, \u003Cb\u003Ede bruijn is useful only for decidable systems. Not Lean.\u003C\u002Fb\u003E\u003C\u002Fblockquote\u003E\u003Cp data-pid=\"0AiR6gMs\"\u003E这一条嘟文的线程中也有人指出, 糟糕的事情并不只是发生在 Lean 的外围或者实现细节上, Lean 目前所采用的类型论本身就依赖于一条尚未被证实的猜想. 想要修复这个问题非常困难. \u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpic4.zhimg.com\u002Fv2-41b69ba43ebe73889c6b7fc7e5921489_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1186\" data-rawheight=\"618\" data-original-token=\"v2-a3f0a419fd51001314da48bca9bf804b\" class=\"origin_image zh-lightbox-thumb\" width=\"1186\" data-original=\"https:\u002F\u002Fpic4.zhimg.com\u002Fv2-41b69ba43ebe73889c6b7fc7e5921489_r.jpg\"\u002F\u003E\u003Cfigcaption\u003Ehttps:\u002F\u002Fmathstodon.xyz\u002F@zwarich@hachyderm.io\u002F116250845924386719\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpic3.zhimg.com\u002Fv2-78bd0d1d354b8c9fe2659e0928f95894_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1190\" data-rawheight=\"568\" data-original-token=\"v2-a321b1c9fc526c1fb695b4ff54831d2b\" class=\"origin_image zh-lightbox-thumb\" width=\"1190\" data-original=\"https:\u002F\u002Fpic3.zhimg.com\u002Fv2-78bd0d1d354b8c9fe2659e0928f95894_r.jpg\"\u002F\u003E\u003Cfigcaption\u003EJon Sterling: 这是达到Leo对 Lean 所轻率宣称的那种保证水平的重要前提之一\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cblockquote data-pid=\"DxAdAjwK\"\u003EAnd, by the way, \u003Cb\u003Eif defeq isn’t decidable\u003C\u002Fb\u003E, then if your plan is to actually implement the sound reducer, you’re toast — because you have to check all these equations that you can’t actually check. That is why in this scenario there are only two options: checking full derivations, or LCF. \u003Cb\u003ELean does neither, of course…\u003C\u002Fb\u003E\u003C\u002Fblockquote\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cimg src=\"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-6feea929558cee925d54822dacc42042_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1188\" data-rawheight=\"682\" data-original-token=\"v2-0617663291662b1c8258c449eac4382c\" class=\"origin_image zh-lightbox-thumb\" width=\"1188\" data-original=\"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-6feea929558cee925d54822dacc42042_r.jpg\"\u002F\u003E\u003Cfigcaption\u003E补刀: https:\u002F\u002Fmathstodon.xyz\u002F@jaycech3n\u002F116249176640727013\u003C\u002Ffigcaption\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"0dmPTgof\"\u003E包括对于类型检查器最为重要的 soundness, 这个内核 bug 在本文发出时还未解决. \u003C\u002Fp\u003E\u003Cblockquote data-pid=\"kg9Xhhi7\"\u003EJon Sterling: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EIt&#39;s also super weird how leo in his prs is \u003Cb\u003Ereally stressing\u003C\u002Fb\u003E now it&#39;s an \u003Cb\u003E\u003Ci\u003Eadversarial exploit\u003C\u002Fi\u003E\u003C\u002Fb\u003E. it&#39;s a \u003Cb\u003Efucking\u003C\u002Fb\u003E bug. deal with it. we all make bugs.\u003C\u002Fblockquote\u003E\u003Cp data-pid=\"bI9ZphLS\"\u003E无可否认的是, 出于科普和通俗宣传目的, 即便讲述者尽力想保持其叙事内容的正确性, 但是当这些内容被 Quanta 等杂志公布在公众面前时, 有极高的概率会变成不实宣传. \u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"0AObm2t-\"\u003E\u003Cimg eeimg=\"1\" src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Cbegin%7Bgathered%7D+%5CLarge+%5Cunderline%7B%5Ctextbf%7BLean+%E6%98%AF%E5%AE%89%E5%85%A8%E5%9F%BA%E7%A1%80%E8%AE%BE%E6%96%BD%7D+%5Ckern%7B3em%7D+%5Ctextbf%7B%E5%90%97%3F%7D%7D+%5Cend%7Bgathered%7D+%5C%5C\" alt=\"\\begin{gathered} \\Large \\underline{\\textbf{Lean 是安全基础设施} \\kern{3em} \\textbf{吗?}} \\end{gathered} \\\\\"\u002F\u003E \u003C\u002Fp\u003E\u003Cblockquote data-pid=\"Uggk21h5\"\u003ECrazazy:\u003Cbr\u002F\u003E\u003Cbr\u002F\u003Emakes it sound like lean is security infrastructure, which miiight be PR for people doing program verification in lean (???), but even then you would have to pull off some next level Jia Tan style supply chain attack at a place where the security of their system actually relies on lean proving it correct and at that point the overlapping area on the venn diagrams is so small I don&#39;t think it exists yet\u003Cbr\u002F\u003E\u003Cbr\u002F\u003ENoCanDo: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003E\u003Cb\u003ELean is not security infrastructure. \u003C\u002Fb\u003EIt is a theorem prover that can perform symbolic verification of code upto ambient assumptions. Nothing works \u003Cb\u003Eif your os decides to do something silly like maliciously swap your proof binaries with something trivially true on a file read system call. And this cant be ruled out in a world of windows machines with copilot.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003E\u003C\u002Fb\u003EJon Sterling: \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EStrongly agree re: &#34;security infrastructure&#34;. Reading those PR threads made me think \u003Cb\u003ELeo must have become a real bozo over the years\u003C\u002Fb\u003E, because it is \u003Cb\u003E\u003Ci\u003Eabsolutely wrong\u003C\u002Fi\u003E\u003C\u002Fb\u003E to treat these things as \u003Cb\u003E\u003Ci\u003Eexploits\u003C\u002Fi\u003E\u003C\u002Fb\u003E.\u003C\u002Fblockquote\u003E\u003Chr\u002F\u003E\u003Cp data-pid=\"eILLEChC\"\u003E\u003Cb\u003E\u003Cbr\u002F\u003E\u003C\u002Fb\u003E我们用Jon Sterling 的另外两篇嘟文 \u003Csup data-text=\"\" data-url=\"https:\u002F\u002Fmathstodon.xyz\u002F@jonmsterling\u002F116251290404594526\" data-draft-node=\"inline\" data-draft-type=\"reference\" data-numero=\"7\"\u003E[7]\u003C\u002Fsup\u003E 来结束这次记录. \u003C\u002Fp\u003E\u003Cblockquote data-pid=\"AbI9DmwS\"\u003EI&#39;ve had an outstpoken supervisor before, and I was never held to account for everything he said (which I do believe to have been in good faith, though controversial and at times debatable)... So by the same token, I won&#39;t attempt to hold the Lean FRO employees to account for the dishonesty of their boss.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003E\u003Cb\u003EBut I do have a message to you:\u003C\u002Fb\u003E \u003Cb\u003EI respect you and your work, and I sympathise with what it must feel like to have your work undermined by dishonest propaganda. And I sincerely wish for you that your next job is one in which you can bring your whole self to the table, including your honesty and your integrity and your mutual respect with the rest of the theorem proving community — which, in private, I obviously take for granted.\u003C\u002Fb\u003E\u003C\u002Fblockquote\u003E\u003Cp class=\"ztext-empty-paragraph\"\u003E\u003Cbr\u002F\u003E\u003C\u002Fp\u003E\u003Cblockquote data-pid=\"ZqvR30kj\"\u003EYou know, the thing is that I have always been happy for Lean&#39;s developers to argue for Lean&#39;s greatness on grounds that are actually true. As I said in my talk \u003Csup data-text=\"也就是前面提到的: Is it time for a new proo
