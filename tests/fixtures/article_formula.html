png?source=32738c0c","badgeStatus":"passed"}],"icon":"https:\u002F\u002Fpica.zhimg.com\u002Fv2-4a07bc69c4bb04444721f35b32125c75_l.png?source=32738c0c","nightIcon":"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-4a07bc69c4bb04444721f35b32125c75_l.png?source=32738c0c"},"exposedMedal":{"medalId":"0","medalName":"","avatarUrl":"","miniAvatarUrl":"","description":"","medalAvatarFrame":null}},"commentPermission":"all","copyrightPermission":"need_review","state":"published","ipInfo":"上海","imageWidth":1600,"imageHeight":2322,"content":"\u003Cp data-pid=\"TMvNpBzF\"\u003E迈克尔逊-莫雷实验可以导出光速不变，导出全局洛伦兹变换，导出狭义相对论。\u003C\u002Fp\u003E\u003Cp data-pid=\"scbMsiod\"\u003E但是后知后觉的讲，我们的宇宙遵守广义相对论，此时全局洛伦兹变换不成立，必须遵守局域洛伦兹变换。\u003C\u002Fp\u003E\u003Cp data-pid=\"Xk2Ui2BC\"\u003E那么问题来了，迈克尔逊-莫雷实验为什么还能成立，照理会有误差啊？地球在干嘛？\u003C\u002Fp\u003E\u003Chr\u002F\u003E\u003Ch2\u003E以太风预言\u003C\u002Fh2\u003E\u003Cp data-pid=\"gNaNOVHr\"\u003E实验的原始目标是探测以太风的影响。\u003C\u002Fp\u003E\u003Cp data-pid=\"jdIGeHAw\"\u003E假设以太存在，地球在以太中以其轨道速度 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=v\" alt=\"v\" eeimg=\"1\"\u002F\u003E 运动。\u003C\u002Fp\u003E\u003Cp data-pid=\"_WHVZmfN\"\u003E对于一个干涉仪，设其两臂长度均为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=L\" alt=\"L\" eeimg=\"1\"\u002F\u003E，当干涉仪旋转 90° 时，产生的干涉条纹移动量 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5CDelta+N\" alt=\"\\Delta N\" eeimg=\"1\"\u002F\u003E 为：\u003C\u002Fp\u003E\u003Cp data-pid=\"KR6sz5iX\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Cbegin%7Baligned%7D++%5CDelta+N+%3D+%5Cfrac%7B2L%7D%7B%5Clambda%7D+%5Cfrac%7Bv%5E2%7D%7Bc%5E2%7D++%5Cend%7Baligned%7D\" alt=\"\\begin{aligned}  \\Delta N = \\frac{2L}{\\lambda} \\frac{v^2}{c^2}  \\end{aligned}\" eeimg=\"1\"\u002F\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"KMUCzV3V\"\u003E在 1887年 Michelson 和 Morley 的第二次实验中, 他们使用了非常精密的设备：\u003C\u002Fp\u003E\u003Cul\u003E\u003Cli data-pid=\"_XiJZ73K\"\u003E光程长度 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=L\" alt=\"L\" eeimg=\"1\"\u002F\u003E 通过多次反射被有效增加到了 11 米\u003C\u002Fli\u003E\u003Cli data-pid=\"FTNltD9q\"\u003E地球的轨道速度 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=v\" alt=\"v\" eeimg=\"1\"\u002F\u003E 约为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=3+%5Ctimes+10%5E4\" alt=\"3 \\times 10^4\" eeimg=\"1\"\u002F\u003E 米\u002F秒. \u003C\u002Fli\u003E\u003Cli data-pid=\"unqPpQO6\"\u003E使用的光源是钠光灯, 其波长 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Clambda\" alt=\"\\lambda\" eeimg=\"1\"\u002F\u003E 约为 589 纳米, 即 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=5.89+%5Ctimes+10%5E%7B-7%7D\" alt=\"5.89 \\times 10^{-7}\" eeimg=\"1\"\u002F\u003E 米. \u003C\u002Fli\u003E\u003Cli data-pid=\"suMgiO0y\"\u003E光速 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=c\" alt=\"c\" eeimg=\"1\"\u002F\u003E 约为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=3+%5Ctimes+10%5E8\" alt=\"3 \\times 10^8\" eeimg=\"1\"\u002F\u003E 米\u002F秒.\u003C\u002Fli\u003E\u003C\u002Ful\u003E\u003Cp data-pid=\"Bm0MXETd\"\u003E代入公式可得:\u003C\u002Fp\u003E\u003Cp data-pid=\"ELTZDuO0\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=+%5Cbegin%7Baligned%7D+%5Cfrac%7Bv%5E2%7D%7Bc%5E2%7D+%26%3D+%5Cleft%28+%5Cfrac%7B3+%5Ctimes+10%5E4%7D%7B3+%5Ctimes+10%5E8%7D+%5Cright%29%5E2+%3D+%2810%5E%7B-4%7D%29%5E2+%3D+10%5E%7B-8%7D+%5C%5C+%5CDelta+N+%26%3D+%5Cfrac%7B2+%5Ctimes+11+%5C%2C%5Cmathrm%7Bm%7D%7D%7B5.89+%5Ctimes+10%5E%7B-7%7D+%5C%2C%5Cmathrm%7Bm%7D%7D+%5Ctimes+10%5E%7B-8%7D+%5C%5C+%26%5Capprox+%283.735+%5Ctimes+10%5E7%29+%5Ctimes+10%5E%7B-8%7D+%5C%5C+%26%5Capprox+0.37+%5Cend%7Baligned%7D+\" alt=\" \\begin{aligned} \\frac{v^2}{c^2} &amp;= \\left( \\frac{3 \\times 10^4}{3 \\times 10^8} \\right)^2 = (10^{-4})^2 = 10^{-8} \\\\ \\Delta N &amp;= \\frac{2 \\times 11 \\,\\mathrm{m}}{5.89 \\times 10^{-7} \\,\\mathrm{m}} \\times 10^{-8} \\\\ &amp;\\approx (3.735 \\times 10^7) \\times 10^{-8} \\\\ &amp;\\approx 0.37 \\end{aligned} \" eeimg=\"1\"\u002F\u003E \u003C\u002Fp\u003E\u003Ch2\u003E狭义相对论预言\u003C\u002Fh2\u003E\u003Cp data-pid=\"R4eSMcG5\"\u003E光速不变，误差是严格的 0。\u003C\u002Fp\u003E\u003Ch2\u003E广义相对论预言\u003C\u002Fh2\u003E\u003Cp data-pid=\"-HYwZ-7B\"\u003E虽然我想从头开始计算，但是太™烦了，一堆参数找不到，不得不退而求其次，用另一个已经验证过了的广义相对论效应辅助计算。\u003C\u002Fp\u003E\u003Cp data-pid=\"O7vfXyRg\"\u003E地球作为一个旋转的、有引力的天体，其表面上的实验室是一个非惯性参考系，时空度规不能选取简单的 Minkowski 度规，要不试试 Kerr 度规，这就是难算的根源。\u003C\u002Fp\u003E\u003Cp data-pid=\"lOUYyhAz\"\u003E想了想，可以考虑 Sagnac 效应和 Lense-Thirring 效应的修正。\u003C\u002Fp\u003E\u003Cp data-pid=\"Xy3YbjAI\"\u003E广义相对论下，旋转参考系中，光沿转动方向和逆着转动方向传播一周所需要的时间是不同的。\u003C\u002Fp\u003E\u003Cp data-pid=\"-uKm4hdP\"\u003E迈克尔逊-莫雷实验的干涉仪虽然不是一个闭合回路，只要是在地球这个巨大的旋转平台上的运动，必然会受到这种效应的影响。\u003C\u002Fp\u003E\u003Cp data-pid=\"ySe-8XBC\"\u003E当干涉仪旋转时，其两臂相对于地球自转方向的取向会发生改变，从而导致光程差的变化。\u003C\u002Fp\u003E\u003Chr\u002F\u003E\u003Cp data-pid=\"PFfhtH8F\"\u003E对于一个两臂长度为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=L\" alt=\"L\" eeimg=\"1\"\u002F\u003E 的干涉仪，位于地理纬度为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Cphi\" alt=\"\\phi\" eeimg=\"1\"\u002F\u003E 的地方时，当仪器从一个方向旋转 90° 时，预期的条纹移动量 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5CDelta+N_%7BGR%7D\" alt=\"\\Delta N_{GR}\" eeimg=\"1\"\u002F\u003E 为：\u003C\u002Fp\u003E\u003Cp data-pid=\"rafhycj-\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Cbegin%7Baligned%7D++%5CDelta+N_%7BGR%7D+%3D+%5Cfrac%7B4+L+%7D%7B%5Clambda+c%7D%5COmega+%5Csin%5Cphi++%5Cend%7Baligned%7D\" alt=\"\\begin{aligned}  \\Delta N_{GR} = \\frac{4 L }{\\lambda c}\\Omega \\sin\\phi  \\end{aligned}\" eeimg=\"1\"\u002F\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"jb_9dYwz\"\u003E其中: \u003C\u002Fp\u003E\u003Cul\u003E\u003Cli data-pid=\"5LnzUMpD\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=L\" alt=\"L\" eeimg=\"1\"\u002F\u003E 代入干涉仪的有效臂长, 约为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=11%5C%2C%5Cmathrm%7Bm%7D\" alt=\"11\\,\\mathrm{m}\" eeimg=\"1\"\u002F\u003E 米. \u003C\u002Fli\u003E\u003Cli data-pid=\"YVfX1NG-\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5COmega\" alt=\"\\Omega\" eeimg=\"1\"\u002F\u003E 代入地球自转的角速度, 约为 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=7.27+%5Ctimes+10%5E%7B-5%7D+%5C%2C%5Cmathrm%7Brad%2Fs%7D\" alt=\"7.27 \\times 10^{-5} \\,\\mathrm{rad\u002Fs}\" eeimg=\"1\"\u002F\u003E\u003C\u002Fli\u003E\u003Cli data-pid=\"vjOXjuhV\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Cphi\" alt=\"\\phi\" eeimg=\"1\"\u002F\u003E 代入实验地点克利夫兰的纬度 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=41.5%5E%5Ccirc\" alt=\"41.5^\\circ\" eeimg=\"1\"\u002F\u003E, 所以 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Csin%5Cphi+%5Capprox+0.66\" alt=\"\\sin\\phi \\approx 0.66\" eeimg=\"1\"\u002F\u003E\u003C\u002Fli\u003E\u003Cli data-pid=\"iM4Z3YiQ\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5Clambda\" alt=\"\\lambda\" eeimg=\"1\"\u002F\u003E 代入光的波长 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=5.89+%5Ctimes+10%5E%7B-7%7D%5C%2C%5Cmathrm%7Bm%7D\" alt=\"5.89 \\times 10^{-7}\\,\\mathrm{m}\" eeimg=\"1\"\u002F\u003E\u003C\u002Fli\u003E\u003Cli data-pid=\"jAYh9y24\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=c\" alt=\"c\" eeimg=\"1\"\u002F\u003E 代入光速 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=3+%5Ctimes+10%5E8%5C%2C%5Cmathrm%7Bm%2Fs%7D\" alt=\"3 \\times 10^8\\,\\mathrm{m\u002Fs}\" eeimg=\"1\"\u002F\u003E\u003C\u002Fli\u003E\u003C\u002Ful\u003E\u003Cp data-pid=\"Uhk7l5WR\"\u003E所以非惯性系给与的修正值为：\u003C\u002Fp\u003E\u003Cp data-pid=\"HyfnMFCl\"\u003E\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=+%5Cbegin%7Baligned%7D+%5CDelta+N_%7BGR%7D+%26%3D+%5Cfrac%7B4+%5Ctimes+11+%5C%2C%5Cmathrm%7Bm%7D+%5Ctimes+%287.27+%5Ctimes+10%5E%7B-5%7D+%5C%2C%5Cmathrm%7Bs%7D%5E%7B-1%7D%29+%5Ctimes+0.66%7D%7B%285.89+%5Ctimes+10%5E%7B-7%7D+%5C%2C%5Cmathrm%7Bm%7D%29+%5Ctimes+%283+%5Ctimes+10%5E8+%5C%2C%5Cmathrm%7Bm%2Fs%7D%29%7D+%5C%5C+%26%5Capprox+%5Cfrac%7B2.11+%5Ctimes+10%5E%7B-3%7D%7D%7B1.767+%5Ctimes+10%5E2%7D+%5C%5C+%26%5Capprox+1.2+%5Ctimes+10%5E%7B-5%7D+%5Cend%7Baligned%7D+\" alt=\" \\begin{aligned} \\Delta N_{GR} &amp;= \\frac{4 \\times 11 \\,\\mathrm{m} \\times (7.27 \\times 10^{-5} \\,\\mathrm{s}^{-1}) \\times 0.66}{(5.89 \\times 10^{-7} \\,\\mathrm{m}) \\times (3 \\times 10^8 \\,\\mathrm{m\u002Fs})} \\\\ &amp;\\approx \\frac{2.11 \\times 10^{-3}}{1.767 \\times 10^2} \\\\ &amp;\\approx 1.2 \\times 10^{-5} \\end{aligned} \" eeimg=\"1\"\u002F\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"bsHx7ASN\"\u003E所以 Sagnac 效应预测的条纹移动大约是 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=1.2+%5Ctimes+10%5E%7B-5%7D\" alt=\"1.2 \\times 10^{-5}\" eeimg=\"1\"\u002F\u003E 个条纹。\u003C\u002Fp\u003E\u003Cp data-pid=\"IbtRLS6S\"\u003E在地球上 Lense-Thirring 效应比  Sagnac 效应小得多的多，更加不需要考虑了。\u003C\u002Fp\u003E\u003Ch2\u003E地球干了啥？\u003C\u002Fh2\u003E\u003Cp data-pid=\"5eJIQb_N\"\u003E现在把三个关键的数值放在一起比一比：\u003C\u002Fp\u003E\u003Col\u003E\u003Cli data-pid=\"zfKXBjO2\"\u003E\u003Cb\u003E经典以太理论的预期差值\u003C\u002Fb\u003E：\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5CDelta+N_%7B%5Ctext%7Bether%7D%7D+%5Capprox+0.4\" alt=\"\\Delta N_{\\text{ether}} \\approx 0.4\" eeimg=\"1\"\u002F\u003E \u003C\u002Fli\u003E\u003Cli data-pid=\"MRmqnfzf\"\u003E\u003Cb\u003E狭义相对论的预测值：\u003C\u002Fb\u003E \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5CDelta+N_%7BSR%7D%3D0\" alt=\"\\Delta N_{SR}=0\" eeimg=\"1\"\u002F\u003E \u003C\u002Fli\u003E\u003Cli data-pid=\"MYBK-dva\"\u003E\u003Cb\u003E广义相对论的预测值修正\u003C\u002Fb\u003E：\u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=%5CDelta+N_%7BGR%7D+%5Capprox+0.000012\" alt=\"\\Delta N_{GR} \\approx 0.000012\" eeimg=\"1\"\u002F\u003E \u003C\u002Fli\u003E\u003Cli data-pid=\"29KGUiMn\"\u003E\u003Cb\u003E1887年实验的探测精度\u003C\u002Fb\u003E：能够分辨约 \u003Cimg src=\"https:\u002F\u002Fwww.zhihu.com\u002Fequation?tex=0.01\" alt=\"0.01\" eeimg=\"1\"\u002F\u003E 个条纹的移动\u003C\u002Fli\u003E\u003C\u002Fol\u003E\u003Cp data-pid=\"vTytF3zP\"\u003E所以说，当时实验的精度远远没有达到能够探测到由地球自转引起的 Sagnac 效应的水平。\u003C\u002Fp\u003E\u003Cp data-pid=\"d0rTVi24\"\u003E总之，地球就是个弟弟，幸好实验是在地球上进行。\u003C\u002Fp\u003E","contentNeedTruncated":false,"forceLoginWhenClickReadMore":false,"adminClosedComment":false,"topics":[],"voteupCount":207,"voting":0,"heavyUpStatus":"allow_heavy_up","column":{"description":"介绍一些有关数学或者游戏的有趣内容,转载不需要授权,表明作者和出处就行....","canManage":false,"intro":"爱数学,爱编程,爱游戏,爱动漫","isFollowing":false,"urlToken":"Dimaze","id":"Dimaze","articlesCount":52,"acceptSubmission":true,"title":"次元壁","url":"https:\u002F\u002Fzhuanlan.zhihu.com\u002FDimaze","commentPermission":"all","created":1459493912,"updated":1591375758,"imageUrl":"https:\u002F\u002Fpic1.zhimg.com\u002F1fe88967a506382f197e5036c450bcc8_720w.jpg?source=172ae18b","author":{"isFollowed":false,"avatarUrlTemplate":"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-8bec9d5bd4a7b338b2b91d0ce1e70ee3.jpg?source=172ae18b","uid":"552474345524494336","userType":"people","isFollowing":false,"urlToken":"GalAster","id":"a74574db96f2d0e717fc410bf90dd150","description":"QQ群1014125","name":"酱紫君","isAdvertiser":false,"headline":"","gender":1,"url":"\u002Fpeople\u002Fa74574db96f2d0e717fc410bf90dd150","avatarUrl":"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-8bec9d5bd4a7b338b2b91d0ce1e70ee3_l.jpg?source=172ae18b","isOrg":false,"type":"people","badgeV2":{"title":"","mergedBadges":[],"detailBadges":[],"icon":"","nightIcon":""}},"followers":1396,"type":"column","columnType":"normal"},"commentCount":16,"contributions":[{"id":52708895,"state":"accepted","type":"first_publish","column":{"description":"介绍一些有关数学或者游戏的有趣内容,转载不需要授权,表明作者和出处就行....","canManage":false,"intro":"爱数学,爱编程,爱游戏,爱动漫","isFollowing":false,"urlToken":
