lan.zhihu.com\u002Fp\u002F96956163"}],"icon":"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-27bfcba90e66db79ce8768ab807e017e_l.png?source=32738c0c","mergedBadges":[{"badgeStatus":"passed","description":"新知答主","detailType":"best","icon":"","nightIcon":"","sources":[],"title":"年度新知答主","type":"best","url":"https:\u002F\u002Fwww.zhihu.com\u002Fquestion\u002F510340037"},{"badgeStatus":"passed","description":"上海交通大学 材料科学与工程博士","detailType":"identity_people","icon":"","nightIcon":"","sources":[],"title":"认证","type":"identity","url":"https:\u002F\u002Fzhuanlan.zhihu.com\u002Fp\u002F96956163"}],"nightIcon":"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-27bfcba90e66db79ce8768ab807e017e_l.png?source=32738c0c","title":"新知答主"},"gender":1,"headline":"","id":"2255a078c784563a8d37f07e3c0b60c9","isAdvertiser":false,"isFollowed":false,"isOrg":false,"isPrivacy":true,"name":"知乎用户","type":"people","url":"https:\u002F\u002Fwww.zhihu.com\u002Fapi\u002Fv4\u002Fpeople\u002F0","urlToken":"","userType":"people"},"bizExt":{},"canComment":{"reason":"","status":true},"collapseReason":"","collapsedBy":"nobody","commentCount":940,"commentPermission":"all","content":"\u003Cp data-pid=\"uYxFhEnC\"\u003E知乎，和别的平台很不一样，在于其对知识深度和广度的拓展和延伸。在这里的很多回答，是需要静下来去读的。并且读完后，能带来长远的思考，\u003Cb\u003E这便是知乎与众不同的地方\u003C\u002Fb\u003E。\u003C\u002Fp\u003E\u003Cp data-pid=\"vT9OMM-l\"\u003E这些带有知识深度和广度的回答是一个个富有灵魂力的答主呕心沥血之作。而答主与读者，答主与答主之间的交互，又让灵魂有了碰撞，从而产生更多的思维触角，\u003Cb\u003E这是目前唯一一个中文社区能做到的\u003C\u002Fb\u003E。\u003C\u002Fp\u003E\u003Cp data-pid=\"mKoMz0q7\"\u003E\u003Cb\u003E这就是知乎！\u003C\u002Fb\u003E吱——\u003C\u002Fp\u003E\u003Cp data-pid=\"feLcMMIL\"\u003E作为知乎2024年的新知答主，在知乎15周年之际，谈谈我与这个社区的“相处之道”。\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cnoscript\u003E\u003Cimg src=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-37aa8cd39c70adf68cf28685025c790f_720w.jpg?source=2c26e567\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"535\" data-rawheight=\"714\" data-original-token=\"v2-37aa8cd39c70adf68cf28685025c790f\" class=\"origin_image zh-lightbox-thumb\" width=\"535\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-37aa8cd39c70adf68cf28685025c790f_r.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Fnoscript\u003E\u003Cimg src=\"data:image\u002Fsvg+xml;utf8,&lt;svg xmlns=&#39;http:\u002F\u002Fwww.w3.org\u002F2000\u002Fsvg&#39; width=&#39;535&#39; height=&#39;714&#39;&gt;&lt;\u002Fsvg&gt;\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"535\" data-rawheight=\"714\" data-original-token=\"v2-37aa8cd39c70adf68cf28685025c790f\" class=\"origin_image zh-lightbox-thumb lazy\" width=\"535\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-37aa8cd39c70adf68cf28685025c790f_r.jpg?source=2c26e567\" data-actualsrc=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-37aa8cd39c70adf68cf28685025c790f_720w.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"avPehqe0\"\u003E从最初的邀请制到如今的万亿问答，知乎早已不只是一个搜答案的地方。作为一个在这里沉淀多年的新知答主，我认为“正确使用知乎”的秘诀在于三个维度的转变：\u003Cb\u003E从搜索到提炼、从信息到认知、从围观到参与。\u003C\u002Fb\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"Xir-SQLn\"\u003E这几年，很多人抱怨知乎内容变杂了，但这往往是因为你还在被动地等待系“喂食”。在信息爆炸的时代，\u003Cb\u003E正确使用知乎的第一步，是夺回你对信息流的控制权。\u003C\u002Fb\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"_mwlcSZk\"\u003E知乎上追好内容，无非两条路径，\u003Cb\u003E要么追人，要么追题\u003C\u002Fb\u003E。但很多老用户都明白，在知乎上关注“人”比关注“题”会有更大的回报感。\u003C\u002Fp\u003E\u003Cp data-pid=\"AFjxweiV\"\u003E问题大多数时候是随机的，但专业答主的输出质量是持续的。不要只在搜索结果里随缘看回答，而要学会在高赞评论区和优秀回答中挖掘那些在特定领域有“实战经验”和“底层逻辑”的答主。关注一个人后，去翻阅他的“动态”和“专栏”。一个真正有含金量的答主，其回答之间往往存在逻辑链条，关注他们就像是订阅了一部不断更新的行业教科书。 \u003C\u002Fp\u003E\u003Cp data-pid=\"Hi6RqXXc\"\u003E比如我，如果想追物理内容，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F5a75408a387d48ce0ab1b74b4d7dfd22\" data-hash=\"5a75408a387d48ce0ab1b74b4d7dfd22\" data-hovercard=\"p$b$5a75408a387d48ce0ab1b74b4d7dfd22\"\u003E@刘易安\u003C\u002Fa\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"QDoCI7SK\"\u003E想看手机数码，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F664bb2d0d9da59faf856af90ed4c6219\" data-hash=\"664bb2d0d9da59faf856af90ed4c6219\" data-hovercard=\"p$b$664bb2d0d9da59faf856af90ed4c6219\"\u003E@Tech阿乐\u003C\u002Fa\u003E 和 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002Fa0fb50809009d32e706c8825920f6063\" data-hash=\"a0fb50809009d32e706c8825920f6063\" data-hovercard=\"p$b$a0fb50809009d32e706c8825920f6063\"\u003E@王之葵托利\u003C\u002Fa\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"Ps-Jhvty\"\u003E想看三国历史，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002Fb196fdb4c8beef3e65c104dd8c48e9f9\" data-hash=\"b196fdb4c8beef3e65c104dd8c48e9f9\" data-hovercard=\"p$b$b196fdb4c8beef3e65c104dd8c48e9f9\"\u003E@今晚天气不错\u003C\u002Fa\u003E \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F06916ab5292b620917a7be1b4945a19d\" data-hash=\"06916ab5292b620917a7be1b4945a19d\" data-hovercard=\"p$b$06916ab5292b620917a7be1b4945a19d\"\u003E@司马懿\u003C\u002Fa\u003E \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F23cbe3fe64992d2eb918e0c694f335ad\" data-hash=\"23cbe3fe64992d2eb918e0c694f335ad\" data-hovercard=\"p$b$23cbe3fe64992d2eb918e0c694f335ad\"\u003E@鸡脚芝士\u003C\u002Fa\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"2p0PO76s\"\u003E想看美食，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002Fad00908df0099cafff1e15caf73d5758\" data-hash=\"ad00908df0099cafff1e15caf73d5758\" data-hovercard=\"p$b$ad00908df0099cafff1e15caf73d5758\"\u003E@企鹅将军\u003C\u002Fa\u003E \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F37bda1ee03d8aaa2ab5923de37f8f1df\" data-hash=\"37bda1ee03d8aaa2ab5923de37f8f1df\" data-hovercard=\"p$b$37bda1ee03d8aaa2ab5923de37f8f1df\"\u003E@珑珑go\u003C\u002Fa\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"c0LHX1LX\"\u003E想看脑认知和学习方法，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F59394a9428ef27fed9a14c7c3944b3ff\" data-hash=\"59394a9428ef27fed9a14c7c3944b3ff\" data-hovercard=\"p$b$59394a9428ef27fed9a14c7c3944b3ff\"\u003E@医路文沫\u003C\u002Fa\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"uFAs2huW\"\u003E想看高校教育，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002Fc79435ba980b07dc92ce36b7d395db6e\" data-hash=\"c79435ba980b07dc92ce36b7d395db6e\" data-hovercard=\"p$b$c79435ba980b07dc92ce36b7d395db6e\"\u003E@我是玉米草莓呀\u003C\u002Fa\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"SELOaQeV\"\u003E想学外语，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F9467d5bdc27211503a3d154ec4d37725\" data-hash=\"9467d5bdc27211503a3d154ec4d37725\" data-hovercard=\"p$b$9467d5bdc27211503a3d154ec4d37725\"\u003E@江以游\u003C\u002Fa\u003E \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F6feaaad20bf7ea1dd01c4af191b19ce5\" data-hash=\"6feaaad20bf7ea1dd01c4af191b19ce5\" data-hovercard=\"p$b$6feaaad20bf7ea1dd01c4af191b19ce5\"\u003E@罗一蝶 Inno\u003C\u002Fa\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"8tdtSI9W\"\u003E想看美妆，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F3caf704ebcc6f17295f0272d4df7c5eb\" data-hash=\"3caf704ebcc6f17295f0272d4df7c5eb\" data-hovercard=\"p$b$3caf704ebcc6f17295f0272d4df7c5eb\"\u003E@凌暴暴\u003C\u002Fa\u003E \u003C\u002Fp\u003E\u003Cp data-pid=\"OagyG8vE\"\u003E想学写作，就看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002F6d37b7079cf480ca70f4bcf6961517d3\" data-hash=\"6d37b7079cf480ca70f4bcf6961517d3\" data-hovercard=\"p$b$6d37b7079cf480ca70f4bcf6961517d3\"\u003E@专三千\u003C\u002Fa\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"oHjaREQS\"\u003E……\u003C\u002Fp\u003E\u003Cp data-pid=\"QCEejI-9\"\u003E好的答主太多了，我这里点不过来，都在我的关注里，喜欢知乎的朋友也可以给自己建立那么一个体系，方便筛选有用信息。\u003C\u002Fp\u003E\u003Cp data-pid=\"79_ZRbQ-\"\u003E像我自己，也专门写了一个针对新手搞科研的实战手册《\u003Ca href=\"https:\u002F\u002Fwww.zhihu.com\u002Fcolumn\u002Fc_1885008743344869432\" class=\"internal\" target=\"_blank\"\u003E新手搞科研系列——从入门到发表\u003C\u002Fa\u003E》，带领各位新手踏入科研门道的实操教程，从读文献、画图、理解科学内容、到写论文，手把手带领你经历科研的每个环节。欢迎订阅~\u003C\u002Fp\u003E\u003Cp data-pid=\"cYa9bnYN\"\u003E\u003Cb\u003E除了追人以外，也要追题。\u003C\u002Fb\u003E但追题不是盲目追，要善用收藏夹，打造的第二大脑。大部分人的收藏夹是信息的坟墓，而聪明人的收藏夹是知识的索引。拒绝使用默认收藏夹，改用知识体系来命名。例如，不要建有用这种看了也不知道会做什么的名字，而要建立像“职场沟通”、“消费心理学”、“深度学习”这种一看就知道内容的命名。\u003C\u002Fp\u003E\u003Cp data-pid=\"meCl72Ml\"\u003E但收藏不等于拥有。正确的使用姿势是，每周抽出一定小时，对本周收藏的内容进行\u003Cb\u003E脱水和提纯\u003C\u002Fb\u003E。将高赞回答中的金句、模型或操作步骤提取出来，用自己的话写成简报，或者直接同步到笔记工具中。只有经过二次加工的信息，才能真正内化。\u003C\u002Fp\u003E\u003Cp data-pid=\"erN8duOH\"\u003E最后，要学习主动调教算法。知乎的首页是根据你的行为生成的。如果你频繁点开八卦和情绪化内容，算法就会认为你喜欢这些。对低质内容果断点选“不感兴趣”；对真正优质的长文，哪怕不看完，也要顺手点个赞。这种正向反馈会让首页质量不断进化。\u003C\u002Fp\u003E\u003Cp data-pid=\"hXv3HqrF\"\u003E\u003Cb\u003E这，便是知乎从搜索到提炼的使用方法。\u003C\u002Fb\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"du-5Io7Q\"\u003E在知乎，最有价值的往往不是排名第一、顺应大众情绪的最高赞，而是那些视角独特、甚至初看让你感到“冒犯”的\u003Cb\u003E非共识回答\u003C\u002Fb\u003E。\u003C\u002Fp\u003E\u003Cp data-pid=\"prpqVm6k\"\u003E其实我们能来知乎，并不只想要一个“行还是不行”的断言，我们想看到的是顶尖的学习者的是\u003Cb\u003E逻辑拆解的颗粒度\u003C\u002Fb\u003E。哪怕完全不同意某个答主的立场，只要他能从法律、经济、社会学等专业视角给出一套自洽的推导逻辑，这就极具参考价值。观察一个行业专家如何定义边界条件、如何选取变量、如何排除干扰因素。这种“思维拆解”的过程，比结论本身更具价值，它是你可以直接复用到自己工作生活中的思维模型。\u003C\u002Fp\u003E\u003Cp data-pid=\"tMfNMWse\"\u003E比如，我经常会去看 \u003Ca class=\"member_mention\" href=\"https:\u002F\u002Fwww.zhihu.com\u002Fpeople\u002Fbd8af9584952286b0f4896f4ef1384f0\" data-hash=\"bd8af9584952286b0f4896f4ef1384f0\" data-hovercard=\"p$b$bd8af9584952286b0f4896f4ef1384f0\"\u003E@龙牙\u003C\u002Fa\u003E 的回答。这是我经历不到的视角。从他的视角里，我能看到他在帮我们抽丝剥茧的看世界。下面这个话题也是我最近关注的一个问题。大家都在对美国斩杀线惊恐万分的时候，龙牙哥说，新闻联播里都说了很多年了，只是社会主义巨婴听不明白而已。\u003C\u002Fp\u003E\u003Cp data-pid=\"myfnhzhl\"\u003E我年轻的时候也总觉得国外好，这好那好哪里都好。其实，那时候还是信息闭塞，身边出国端盘子端屎端尿那帮人回来还要趾高气昂说自己在彼岸过的多好多好。直到我自己在国外住了一段时间，在各个各国兜兜转转了一下，直到互联网发达后，各种真相渐渐浮出水面，逻辑开始清晰……\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cnoscript\u003E\u003Cimg src=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-5f6e9d59d55da6c822b5610b4ad27553_720w.jpg?source=2c26e567\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"1503\" data-rawheight=\"587\" data-original-token=\"v2-5f6e9d59d55da6c822b5610b4ad27553\" class=\"origin_image zh-lightbox-thumb\" width=\"1503\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-5f6e9d59d55da6c822b5610b4ad27553_r.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Fnoscript\u003E\u003Cimg src=\"data:image\u002Fsvg+xml;utf8,&lt;svg xmlns=&#39;http:\u002F\u002Fwww.w3.org\u002F2000\u002Fsvg&#39; width=&#39;1503&#39; height=&#39;587&#39;&gt;&lt;\u002Fsvg&gt;\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"1503\" data-rawheight=\"587\" data-original-token=\"v2-5f6e9d59d55da6c822b5610b4ad27553\" class=\"origin_image zh-lightbox-thumb lazy\" width=\"1503\" data-original=\"https:\u002F\u002Fpicx.zhimg.com\u002Fv2-5f6e9d59d55da6c822b5610b4ad27553_r.jpg?source=2c26e567\" data-actualsrc=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-5f6e9d59d55da6c822b5610b4ad27553_720w.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"Nfzr_NCz\"\u003E单一的信息源容易让人陷入“信息茧房”。正确使用知乎的方式是，在一个争议性话题下，主动寻找那些“高质量的反面意见”。当觉得被某个回答说服时，强迫自己去拉到评论区或相关问题下，找找看有没有专业的质疑声。在两种甚至多种观点的“碰撞缝隙”中，才更有可能看清事物的全貌，避免被单一逻辑降维打击。\u003C\u002Fp\u003E\u003Cp data-pid=\"w8GD----\"\u003E在这里，可以把知乎看作一个“低成本的模拟实验室”。当一个观点打破自己思维定式时，不要急于反驳，而要问自己：“为什么他会这么想？他掌握了哪些我不知道的底层数据？”这种心态的转变，会让人从一个“围观者”变成一个深度的“思想博弈者”。\u003C\u002Fp\u003E\u003Cp data-pid=\"h7Qi-9pu\"\u003E在这个博弈过程中，认知慢慢被重塑，越来越客观，心态也越来越平和。\u003C\u002Fp\u003E\u003Cp data-pid=\"mgYy-AqY\"\u003E\u003Cb\u003E这，便是知乎从信息到认知的使用方法。\u003C\u002Fb\u003E\u003C\u002Fp\u003E\u003Cp data-pid=\"QBMjy8h1\"\u003E如果在知乎只是“潜水”看热闹，那么可能只发挥了知乎5%的价值。知乎最迷人的地方不在于它是一个知识库，而在于它是一个“\u003Cb\u003E知识的实验室\u003C\u002Fb\u003E”。\u003C\u002Fp\u003E\u003Cp data-pid=\"NtDoMHXV\"\u003E很多知识在你读到时，只是“看起来懂了”，但当你试图回答一个专业问题时，你会发现逻辑链条上的漏洞。就像我也经常给自己的研究生讲这个问题，做了实验数据好像是做出来了，但实际上一写论文，就发现前后的数据似乎逻辑是对不上的。\u003C\u002Fp\u003E\u003Cp data-pid=\"ogyPT1We\"\u003E为了写出一篇经得起推敲的回答，必须强迫自己去查阅资料、对比多方数据、翻译晦涩的专业词汇，并用平实易懂的语言表达出来。这种“\u003Cb\u003E输出式学习\u003C\u002Fb\u003E”会形成强烈的反馈回路，让学习效率呈指数级增长。正如那句话所说：“如果你不能简单地解释它，说明你还没真正理解它。”\u003C\u002Fp\u003E\u003Cp data-pid=\"Q_nU0cXP\"\u003E以前也有一些人来跟我讨论过成长的问题，他们羡慕有些人那么厉害，似乎什么都会什么都懂。\u003Cb\u003E我告诉他们，这些人出生的时候，也是什么都不会的。他们之所以会，是因为他们一直在学。\u003C\u002Fb\u003E如果想成长，那么培养一个输出型爱好，是非常具有性价比的事情。比如，写知乎，一开始可能只是对某个领域懵懵懂懂，但为了写好一个回答，会学习很多东西，这种倒逼式学习会推着人快速成长。\u003C\u002Fp\u003E\u003Cp data-pid=\"9k3OUdCj\"\u003E写，是最好的学。\u003C\u002Fp\u003E\u003Cp data-pid=\"_chc9yfb\"\u003E但，并不是每个人都会选择这样做的，他们会用，不会，不喜欢，不愿意来推脱，本质上，还是畏难。\u003C\u002Fp\u003E\u003Cp data-pid=\"bl55PNDV\"\u003E在知乎写下的每一篇优质回答，都是在互联网上全天候工作的“数字化身”。一个深思熟虑的回答，即便在发布数年后，依然能通过搜索和算法推荐为答主持续赢得尊重和认可。相比于转瞬即逝的碎片化社交，这种“\u003Cb\u003E长效内容\u003C\u002Fb\u003E”具有极强的复利效应，它是你个人专业能力的最好背书。\u003C\u002Fp\u003E\u003Cp data-pid=\"oYJbsd0A\"\u003E我在早期的时候，回答了一个毕设论文抽检的问题。在当年6月发表时，数据平平无奇，但谁也不知道的是，一年后的6月和7月，这篇回答火速飙升，不断有留言，不断有关注，不断有咨询。这让我看到了优质回答的意义。即使到今天，我曾经若干年前的优质回答，也依然有人在点赞评论。\u003C\u002Fp\u003E\u003Cp data-pid=\"4chrCr6k\"\u003E优质的回答，就像一个高频发射器，让我收获了很多有趣的灵魂，吸引那些与我同频、比我更专业的人。通过评论区的专业交锋、私信里的深度探讨，知乎总能帮我连接到那些在现实生活中难以触及的行业大拿。这些志同道合者，最终会沉淀为个人认知圈层中最优质的“社交资产”。\u003C\u002Fp\u003E\u003Cp data-pid=\"6v4T6o7u\"\u003E当开始动笔时，你就不再只是被动接受信息的观众，而是成为了某个领域知识的“贡献者”和“定义者”。\u003C\u002Fp\u003E\u003Cp data-pid=\"zd1_uks0\"\u003E在知乎15年的知识流动中，每一个真诚分享的答主，都在参与重塑中文互联网的信息质量。\u003C\u002Fp\u003E\u003Cp data-pid=\"u--L63CF\"\u003E\u003Cb\u003E这，便是知乎从围观到参与的使用方法。\u003C\u002Fb\u003E\u003C\u002Fp\u003E\u003Cfigure data-size=\"normal\"\u003E\u003Cnoscript\u003E\u003Cimg src=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-e7ac49bfd6e37e3c6e4b09ae60e28a28_720w.jpg?source=2c26e567\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"3272\" data-rawheight=\"2760\" data-original-token=\"v2-e7ac49bfd6e37e3c6e4b09ae60e28a28\" class=\"origin_image zh-lightbox-thumb\" width=\"3272\" data-original=\"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-e7ac49bfd6e37e3c6e4b09ae60e28a28_r.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Fnoscript\u003E\u003Cimg src=\"data:image\u002Fsvg+xml;utf8,&lt;svg xmlns=&#39;http:\u002F\u002Fwww.w3.org\u002F2000\u002Fsvg&#39; width=&#39;3272&#39; height=&#39;2760&#39;&gt;&lt;\u002Fsvg&gt;\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"3272\" data-rawheight=\"2760\" data-original-token=\"v2-e7ac49bfd6e37e3c6e4b09ae60e28a28\" class=\"origin_image zh-lightbox-thumb lazy\" width=\"3272\" data-original=\"https:\u002F\u002Fpic1.zhimg.com\u002Fv2-e7ac49bfd6e37e3c6e4b09ae60e28a28_r.jpg?source=2c26e567\" data-actualsrc=\"https:\u002F\u002Fpicx.zhimg.com\u002F50\u002Fv2-e7ac49bfd6e37e3c6e4b09ae60e28a28_720w.jpg?source=2c26e567\"\u002F\u003E\u003C\u002Ffigure\u003E\u003Cp data-pid=\"xJrGGY-Q\"\u003E\u003Cb\u003E我是夏夏回来了，一个在高校工作了很多年的博士，担任多个SCI期刊的编辑编委，擅长研究生培养和SCI论文写作发表，我在知乎写了个付费专栏《\u003C\u002Fb\u003E\u003Ca href=\"https:\u002F\u002Fwww.zhihu.com\u002Fcolumn\u002Fc_1885008743344869432\" class=\"internal\" target=\"_blank\"\u003E新手搞科研系列——从入门到发表\u003C\u002Fa\u003E\u003Cb\u003E》，带领各位新手科研者踏入科研门道的实操教程，从读文献、画图、理解科学内容、到写论文，手把手带领你经历科研的每个环节。\u003C\u002Fb\u003E\u003C\u002Fp\u003E","contentNeedTruncated":true,"createdTime":1767609632,"editableContent":"","excerpt":"知乎，和别的平台很不一样，在于其对知识深度和广度的拓展和延伸。在这里的很多回答，是需要静下来去读的。并且读完后，能带来长远的思考， 这便是知乎与众不同的地方。这些带有知识深度和广度的回答是一个个富有灵魂力的答主呕心沥血之作。而答主与读者，答主与答主之间的交互，又让灵魂有了碰撞，从而产生更多的思维触角， 这是目前唯一一个中文社区能做到的。 这就是知乎！吱——作为知乎2024年的新知答主，在知乎15周年之际…","extras":"","favlistsCount":4381,"forceLoginWhenClickReadMore":false,"hasColumn":false,"id":"1991579825958303223","ipInfo":"江苏","isCollapsed":false,"isCopyable":false,"isJumpNative":false,"isLabeled":false,"isNormal":true,"isSticky":false,"isVisible":true,"podcastAudioEnter":{"actionUrl":"zhihu:\u002F\u002Fpodcast\u002Faudio_player\u002F57025412697?contentId=1991579825958303223&contentType=answer&subType=&entrance=detail_page","subType":"","text":"323 人听过","textColor":"MapBrand","textSize":13},"question":{"created":1292786840,"id":"19550225","questionType":"normal","relationship":{},"title":"如何正确使用知乎？","type":"question","updatedTime":1768908473,"url":"https:\u002F\u002Fwww.zhihu.com\u002Fapi\u002Fv4\u002Fquestions\u002F19550225"},"reaction":{"imageReactions":{"v237aa8cd39c70adf68cf28685025c790f":{"isLiked":false,"likeCount":27},"v25f6e9d59d55da6c822b5610b4ad27553":{"isLiked":false,"likeCount":8},"v2E7ac49bfd6e37e3c6e4b09ae60e28a28":{"isLiked":false,"likeCount":17}},"relation":{"currentUserIsNavigator":false,"faved":false,"following":false,"imgLiked":{"v237aa8cd39c70adf68cf28685025c790f":false,"v25f6e9d59d55da6c822b5610b4ad27553":false,"v2E7ac49bfd6e37e3c6e4b09ae60e28a28":false},"isAuthor":false,"isNavigatorVote":false,"liked":false,"subcribed":false,"vote":"Neutral","voteNextStep":""},"statistics":{"applaudCount":0,"bulletCount":0,"commentCount":940,"downVoteCount":41,"favorites":4381,"imgLikeCount":{"v237aa8cd39c70adf68cf28685025c790f":27,"v25f6e9d59d55da6c822b5610b4ad27553":8,"v2E7ac49bfd6e37e3c6e4b09ae60e28a28":17},"interestPlayCount":0,"likeCount":363,"plaincontentLikeCount":0,"plaincontentVoteUpCount":0,"playCount":0,"pvCount":0,"questionAnswerCount":0,"questionFollowerCount":0,"republishers":[],"shareCount":0,"subscribeCount":0,"upVoteCount":4521}},"reactionInstruction":{},"relationship":{"isAuthor":false,"isAuthorized":false,"isFavorited":false,"isNothelp":false,"isThanked":false,"upvotedFollowees":[],"voting":0},"relevantInfo":{"isRelevant":false,"relevantText":"","relevantType":""},"reshipmentSettings":"need_payment","rewardInfo":{"canOpenReward":false,"isRewardable":true,"rewardMemberCount":1,"rewardTotalMoney":0,"tagline":"真诚赞赏，手留余香"},"segmentInfos":[{"marks":[{"endIndex":89,"segInfo":{"commentCount":2,"isLike":false,"isSpan":false,"likeCount":14,"myCommentCount":0,"segIds":["2012462972988047400"]},"startIndex":0}],"pid":"vT9OMM-l","text":"这些带有知识深度和广度的回答是一个个富有灵魂力的答主呕心沥血之作。而答主与读者，答主与答主之间的交互，又让灵魂有了碰撞，从而产生更多的思维触角，这是目前唯一一个中文社区能做到的。"},{"marks":[{"endIndex":94,"segInfo":{"commentCount":1,"isLike":false,"isSpan":false,"likeCount":12,"myCommentCount":0,"segIds":["1996888908408058480"]},"startIndex":32}],"pid":"avPehqe0","text":"从最初的邀请制到如今的万亿问答，知乎早已不只是一个搜答案的地方。作为一个在这里沉淀多年的新知答主，我认为“正确使用知乎”的秘诀在于三个维度的转变：从搜索到提炼、从信息到认知、从围观到参与。"},{"marks":[{"endIndex":71,"segInfo":{"commentCount":2,"isLike":false,"isSpan":false,"likeCount":10,"myCommentCount":0,"segIds":["2028674924789646394"]},"startIndex":0}],"pid":"Xir-SQLn","text":"这几年，很多人抱怨知乎内容变杂了，但这往往是因为你还在被动地等待系“喂食”。在信息爆炸的时代，正确使用知乎的第一步，是夺回你对信息流的控制权。"},{"marks":[{"endIndex":59,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":11,"myCommentCount":0,"segIds":["2021377632726466667"]},"startIndex":0}],"pid":"_mwlcSZk","text":"知乎上追好内容，无非两条路径，要么追人，要么追题。但很多老用户都明白，在知乎上关注“人”比关注“题”会有更大的回报感。"},{"marks":[{"endIndex":27,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":5,"myCommentCount":0,"segIds":["2012463114763937261"]},"startIndex":0},{"endIndex":84,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":6,"myCommentCount":0,"segIds":["2014286115037807893"]},"startIndex":44}],"pid":"AFjxweiV","text":"问题大多数时候是随机的，但专业答主的输出质量是持续的。不要只在搜索结果里随缘看回答，而要学会在高赞评论区和优秀回答中挖掘那些在特定领域有“实战经验”和“底层逻辑”的答主。关注一个人后，去翻阅他的“动态”和“专栏”。一个真正有含金量的答主，其回答之间往往存在逻辑链条，关注他们就像是订阅了一部不断更新的行业教科书。 "},{"marks":[{"endIndex":85,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":6,"myCommentCount":0,"segIds":["2007865835713225127"]},"startIndex":21}],"pid":"cYa9bnYN","text":"除了追人以外，也要追题。但追题不是盲目追，要善用收藏夹，打造的第二大脑。大部分人的收藏夹是信息的坟墓，而聪明人的收藏夹是知识的索引。拒绝使用默认收藏夹，改用知识体系来命名。例如，不要建有用这种看了也不知道会做什么的名字，而要建立像“职场沟通”、“消费心理学”、“深度学习”这种一看就知道内容的命名。"},{"marks":[{"endIndex":107,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":23,"myCommentCount":0,"segIds":["2006297581978924319"]},"startIndex":0}],"pid":"meCl72Ml","text":"但收藏不等于拥有。正确的使用姿势是，每周抽出一定小时，对本周收藏的内容进行脱水和提纯。将高赞回答中的金句、模型或操作步骤提取出来，用自己的话写成简报，或者直接同步到笔记工具中。只有经过二次加工的信息，才能真正内化。"},{"marks":[{"endIndex":113,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":10,"myCommentCount":0,"segIds":["2020569372289243016"]},"startIndex":0}],"pid":"erN8duOH","text":"最后，要学习主动调教算法。知乎的首页是根据你的行为生成的。如果你频繁点开八卦和情绪化内容，算法就会认为你喜欢这些。对低质内容果断点选“不感兴趣”；对真正优质的长文，哪怕不看完，也要顺手点个赞。这种正向反馈会让首页质量不断进化。"},{"marks":[{"endIndex":57,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":11,"myCommentCount":0,"segIds":["2024937437659415295"]},"startIndex":3}],"pid":"du-5Io7Q","text":"在知乎，最有价值的往往不是排名第一、顺应大众情绪的最高赞，而是那些视角独特、甚至初看让你感到“冒犯”的非共识回答。"},{"marks":[{"endIndex":184,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":16,"myCommentCount":0,"segIds":["2001071472043639809"]},"startIndex":0}],"pid":"prpqVm6k","text":"其实我们能来知乎，并不只想要一个“行还是不行”的断言，我们想看到的是顶尖的学习者的是逻辑拆解的颗粒度。哪怕完全不同意某个答主的立场，只要他能从法律、经济、社会学等专业视角给出一套自洽的推导逻辑，这就极具参考价值。观察一个行业专家如何定义边界条件、如何选取变量、如何排除干扰因素。这种“思维拆解”的过程，比结论本身更具价值，它是你可以直接复用到自己工作生活中的思维模型。"},{"marks":[{"endIndex":142,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":20,"myCommentCount":0,"segIds":["2020095888140292719"]},"startIndex":0}],"pid":"Nfzr_NCz","text":"单一的信息源容易让人陷入“信息茧房”。正确使用知乎的方式是，在一个争议性话题下，主动寻找那些“高质量的反面意见”。当觉得被某个回答说服时，强迫自己去拉到评论区或相关问题下，找找看有没有专业的质疑声。在两种甚至多种观点的“碰撞缝隙”中，才更有可能看清事物的全貌，避免被单一逻辑降维打击。"},{"marks":[{"endIndex":114,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":21,"myCommentCount":0,"segIds":["2001071829368997099"]},"startIndex":0}],"pid":"w8GD----","text":"在这里，可以把知乎看作一个“低成本的模拟实验室”。当一个观点打破自己思维定式时，不要急于反驳，而要问自己：“为什么他会这么想？他掌握了哪些我不知道的底层数据？”这种心态的转变，会让人从一个“围观者”变成一个深度的“思想博弈者”。"},{"marks":[{"endIndex":108,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":6,"myCommentCount":0,"segIds":["2031598075211429127"]},"startIndex":0}],"pid":"NtDoMHXV","text":"很多知识在你读到时，只是“看起来懂了”，但当你试图回答一个专业问题时，你会发现逻辑链条上的漏洞。就像我也经常给自己的研究生讲这个问题，做了实验数据好像是做出来了，但实际上一写论文，就发现前后的数据似乎逻辑是对不上的。"},{"marks":[{"endIndex":123,"segInfo":{"commentCount":5,"isLike":false,"isSpan":false,"likeCount":16,"myCommentCount":0,"segIds":["2018131109280522897"]},"startIndex":0}],"pid":"ogyPT1We","text":"为了写出一篇经得起推敲的回答，必须强迫自己去查阅资料、对比多方数据、翻译晦涩的专业词汇，并用平实易懂的语言表达出来。这种“输出式学习”会形成强烈的反馈回路，让学习效率呈指数级增长。正如那句话所说：“如果你不能简单地解释它，说明你还没真正理解它。”"},{"marks":[{"endIndex":171,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":13,"myCommentCount":0,"segIds":["2031597967682094297"]},"startIndex":48}],"pid":"Q_nU0cXP","text":"以前也有一些人来跟我讨论过成长的问题，他们羡慕有些人那么厉害，似乎什么都会什么都懂。我告诉他们，这些人出生的时候，也是什么都不会的。他们之所以会，是因为他们一直在学。如果想成长，那么培养一个输出型爱好，是非常具有性价比的事情。比如，写知乎，一开始可能只是对某个领域懵懵懂懂，但为了写好一个回答，会学习很多东西，这种倒逼式学习会推着人快速成长。"},{"marks":[{"endIndex":8,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":7,"myCommentCount":0,"segIds":["2012179255837081837"]},"startIndex":0}],"pid":"9k3OUdCj","text":"写，是最好的学。"},{"marks":[{"endIndex":47,"segInfo":{"commentCount":0,"isLike":false,"isSpan":false,"likeCount":5,"myCommentCount":0,"segIds":["2012179542752646315"]},"startIndex":0}],"pid":"6v4T6o7u","text":"当开始动笔时，你就不再只是被动接受信息的观众，而是成为了某个领域知识的“贡献者”和“定义者”。"}],"settings":{"tableOfContents":{"enabled":false}},"suggestEdit":{"reason":"","status":false,"tip":"","title":"","unnormalDetails":{"description":"","note":"","reason":"","reasonId":0,"status":""},"url":""},"thanksCount":363,"type":"answer","updatedTime":1768269622,"url":"https:\u002F\u002Fwww.zhihu.com\u002Fapi\u002Fv4\u002Fanswers\u002F1991579825958303223","voteupCount":4521}},"articles":{},"columns":{},"topics":{},"roundtables":{},"favlists":{},"comments":{},"notifications":{},"ebooks":{},"activities":{},"feeds":{},"pins":{},"promotions":{},"drafts":{},"chats":{},"posts":{},"zvideos":{},"eduCourses":{},"lineComments":{}},"currentUser":"","account":{"unlockTicketStatus":false,"unlockTicket":null,"challenge":[],"errorStatus":false,"message":"","isFetching":false,"accountInfo":{},"urlToken":{"loading":false},"cardUserInfo":{"vipInfo":{}},"handleWidget":{},"widgetList":[],"userWidgetId":"","accountList":[],"accountSwitcher":{"show":false}},"settings":{"socialBind":null,"inboxMsg":null,"notification":{},"email":{},"privacyFlag":null,"blockedUsers":{"isFetching":false,"paging":{"pageNo":1,"pageSize":6
