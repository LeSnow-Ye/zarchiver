271e56fa36b\" data-private-watermark-src=\"\" class=\"origin_image inline-img zh-lightbox-thumb\" data-original=\"https://pic1.zhimg.com/v2-af17070fc7977b2bf20331cb42ea32ea_r.jpg\"/>最近学习了一下预测IK，效果确实要比传统的IK好很多；首先感谢各位大佬，特别是 <a class=\"member_mention\" href=\"https://www.zhihu.com/people/7504f3733e353a547308fa00d1b76183\" data-hash=\"7504f3733e353a547308fa00d1b76183\" data-hovercard=\"p$b$7504f3733e353a547308fa00d1b76183\">@Shadow</a> <a class=\"member_mention\" href=\"https://www.zhihu.com/people/f303dbb2247c4d157b382565a4356bb1\" data-hash=\"f303dbb2247c4d157b382565a4356bb1\" data-hovercard=\"p$b$f303dbb2247c4d157b382565a4356bb1\">@依卞</a> 两位大佬的文章，对于技术实现非常详细；以及 <a class=\"member_mention\" href=\"https://www.zhihu.com/people/3af6a23fc64070be189acd24c5538e7c\" data-hash=\"3af6a23fc64070be189acd24c5538e7c\" data-hovercard=\"p$b$3af6a23fc64070be189acd24c5538e7c\">@猫尾草-zzZ</a> 的答疑解惑；我的这一篇主要是个人实现过程中遇到的一些问题，解决方式以及一些小思考；由于笨人是个…", "created": 1768152047, "updated": 1772285306, "author": {"isFollowed": false, "avatarUrlTemplate": "https://picx.zhimg.com/v2-7c1bba93e6c3ee565ca124db3e586329.jpg?source=172ae18b", "uid": "1261938934047055872", "userType": "people", "isFollowing": false, "urlToken": "zhi-cheng-97-77", "id": "278f2dec519d749c2b8332e483ad8747", "description": "", "name": "纸橙", "isAdvertiser": false, "headline": "TTAATAA", "gender": 1, "url": "/people/278f2dec519d749c2b8332e483ad8747", "avatarUrl": "https://pic1.zhimg.com/v2-7c1bba93e6c3ee565ca124db3e586329_l.jpg?source=172ae18b", "isOrg": false, "type": "people", "badge": [], "badgeV2": {"title": "TTAATAA", "mergedBadges": [], "detailBadges": [], "icon": "", "nightIcon": ""}, "exposedMedal": {"medalId": "972477022068568064", "medalName": "备受瞩目", "avatarUrl": "https://picx.zhimg.com/v2-7565d834d652a9960da0cedd8d7952ee_r.png?source=172ae18b", "miniAvatarUrl": "https://picx.zhimg.com/v2-7565d834d652a9960da0cedd8d7952ee_l.png?source=172ae18b", "description": "被 100 个人关注", "medalAvatarFrame": ""}}, "commentPermission": "all", "copyrightPermission": "need_review", "state": "published", "ipInfo": "湖北", "imageWidth": 3840, "imageHeight": 2160, "content": "<blockquote data-pid=\"3z0m_H6W\">最近学习了一下预测IK，效果确实要比传统的IK好很多；首先感谢各位大佬，特别是 <a class=\"member_mention\" href=\"https://www.zhihu.com/people/7504f3733e353a547308fa00d1b76183\" data-hash=\"7504f3733e353a547308fa00d1b76183\" data-hovercard=\"p$b$7504f3733e353a547308fa00d1b76183\">@Shadow</a> <a class=\"member_mention\" href=\"https://www.zhihu.com/people/f303dbb2247c4d157b382565a4356bb1\" data-hash=\"f303dbb2247c4d157b382565a4356bb1\" data-hovercard=\"p$b$f303dbb2247c4d157b382565a4356bb1\">@依卞</a> 两位大佬的文章，对于技术实现非常详细；以及 <a class=\"member_mention\" href=\"https://www.zhihu.com/people/3af6a23fc64070be189acd24c5538e7c\" data-hash=\"3af6a23fc64070be189acd24c5538e7c\" data-hovercard=\"p$b$3af6a23fc64070be189acd24c5538e7c\">@猫尾草-zzZ</a> 的答疑解惑；我的这一篇主要是个人实现过程中遇到的一些问题，解决方式以及一些小思考；由于笨人是个美术生，很多数理和算法做的不好，很多解决的方式也比较简单粗暴，如果有更好的方法我会在在后面及时更新的；话不多说，直接开始：</blockquote><h2>实现效果：</h2><a class=\"video-box\" href=\"https://link.zhihu.com/?target=https%3A//www.zhihu.com/video/1993770237586334346\" target=\"_blank\" data-video-id=\"\" data-video-playable=\"true\" data-name=\"预测IK的简单实现\" data-poster=\"https://pic1.zhimg.com/v2-61e3588c791ee0ee37c99617e21144d8_1440w.jpg?source=ccfced1a\" data-lens-id=\"1993770237586334346\"><img class=\"thumbnail\" src=\"https://pic1.zhimg.com/v2-61e3588c791ee0ee37c99617e21144d8_1440w.jpg?source=ccfced1a\"/><span class=\"content\"><span class=\"title\">预测IK的简单实现<span class=\"z-ico-extern-gray\"></span><span class=\"z-ico-extern-blue\"></span></span><span class=\"url\"><span class=\"z-ico-video\"></span>https://www.zhihu.com/video/1993770237586334346</span></span></a><h2>实现步骤与原理总结</h2><p data-pid=\"FX7pEZz3\">首先，总结一下预测IK的实现原理/步骤，理清整个计算过程会让思路清晰得多；整个实现思路主要是学习 <a class=\"member_mention\" href=\"https://www.zhihu.com/people/7504f3733e353a547308fa00d1b76183\" data-hash=\"7504f3733e353a547308fa00d1b76183\" data-hovercard=\"p$b$7504f3733e353a547308fa00d1b76183\">@Shadow</a> 佬的 <a href=\"https://zhuanlan.zhihu.com/p/679650155\" class=\"internal\" target=\"_blank\">预测脚步IK实现-PredictFootIK</a></p><h3>一--预测下一次的落脚点</h3><p data-pid=\"g-pxrMo9\">1---记录上一次脚落下的位置；<br/>2---根据上一次脚落下的位置，当前距离下一次落脚的时间，以及当前的速度来预测下一次落脚的水平位置；<br/>3---在预测的水平位置处进行检测，找到下一次落脚的竖直位置，此时就得到了下一次落脚的位置信息；</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-cc1d57032d2965e64cd71271e56fa36b_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2798\" data-rawheight=\"1762\" data-original-token=\"v2-af17070fc7977b2bf20331cb42ea32ea\" class=\"origin_image zh-lightbox-thumb\" width=\"2798\" data-original=\"https://pic4.zhimg.com/v2-cc1d57032d2965e64cd71271e56fa36b_r.jpg\"/><figcaption>图中绿色方体的是上一步落脚点，红色为预测的下一步落脚点</figcaption></figure><h3>二--计算脚的运动路线(实际是增幅路线)FootPath</h3><p data-pid=\"hpy6BaAO\">1---分别以前后两次落脚点为起点终点，进行两次检测；如果产生碰撞，则从碰撞点的上方向下检测，得到新的点；<br/>2---以新的点作为起点终点，重复上述行为，再次得到新的点；<br/>3---不断迭代，直到达到预设的迭代次数，或者没有产生新的碰撞；将所有点按顺序连接起来，得到的就是整个FootPath；</p><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-1e0343145ec6d16e9ac0f24ed4b80eaf_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2503\" data-rawheight=\"1732\" data-original-token=\"v2-009a4251f4e0252c8c4201c7958a25d6\" class=\"origin_image zh-lightbox-thumb\" width=\"2503\" data-original=\"https://picx.zhimg.com/v2-1e0343145ec6d16e9ac0f24ed4b80eaf_r.jpg\"/><figcaption>图中的蓝色方体为FootPath的路径点，红线则为脚的运动路径</figcaption></figure><h3>三--采样FootPath</h3><p data-pid=\"v9qNnkXv\">采样上一步的FootPath，得到当前帧脚的高度；</p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-65ea06575f31b4b2e3b2c0be9399f8e4_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2372\" data-rawheight=\"1687\" data-original-token=\"v2-0620b9aa010564af4887d00d6cf4f573\" class=\"origin_image zh-lightbox-thumb\" width=\"2372\" data-original=\"https://pic3.zhimg.com/v2-65ea06575f31b4b2e3b2c0be9399f8e4_r.jpg\"/><figcaption>图中的绿色方框是实际采样的FootPath位置，红色方框是插值处理后的FootPath位置；</figcaption></figure><h3>四--对计算出来的结果进行一些额外的处理</h3><p data-pid=\"slueB8_0\">这一步实际上并不是必须的，不过我个人在实现的过程中，发现有一些问题很难直接解决，所以进行了一些额外的计算，比如发力脚下沉，穿墙修复；</p><h3>五--应用计算结果到Pose</h3><p data-pid=\"P_XD6HT-\">将前面的计算结果应用到动画，在这里我采用的是ALS的实现方式，也就是提前制作VB虚拟骨骼当做变量使用，而角色原本的ik骨骼当做参考信息，只用于计算而不做实际修改；</p><h3>隐含的计算--盆骨位置</h3><p data-pid=\"hXN6M8um\">前面说的步骤已经能实现出脚部预测了，但是这样的实现结果表现并不好；一个很关键的原因在于脚部独立于身体计算，这会导致脚到盆骨的距离是不可控的，产生一些奇怪的效果，比如腿部过度压缩或者拉伸等；因此，还需要对盆骨进行一些额外的计算处理；</p><h2>一---关于预测落脚点</h2><p data-pid=\"XvWXS_Rr\">预测落脚点实现起来比较简单，当脚落下时，记录下脚的世界坐标并转换为Actor本地坐标；然后每帧还原Actor坐标为世界坐标，并加上 剩余时间*速度，得到预测的水平坐标；</p><p data-pid=\"iERQVUAI\">这一块的计算里面，速度和剩余时间基本上不会出错，而误差其实出现在记录脚的世界坐标的时间；要保证预测位置正确，很重要的一点是要保证预测位置的动作和记录位置的动作是同样的，对循环动画来说，就是预测的时间点和上一步的记录踩下的时间点是在同一处；</p><p data-pid=\"TuQukpx4\">这样说可能有一些难懂，这里拿我的曲线来解释，我定义了两种曲线；一个是FootState，1表示脚踩下，0表示脚抬起；另一个是FootDown_Time（原谅我的塑料英语），表示的是从当前帧到下一次脚落地还需要多长时间；</p><p data-pid=\"IuJrEScD\">那么前面说 要保证预测位置的动作和记录位置的动作是同样的 该如何理解呢？按这个动画来说，我记录的剩余时间曲线是的意义是 从当前动画帧到下一次播放图片中的姿势（也就是图片中左脚刚刚踩实的姿势）还需要多久；</p><p data-pid=\"tqVz-Mtr\">所以说，这里曲线的时间都明确指向的是图片中这个姿势，也就是说，距离出现这个姿势还需要多久；因此，一个显而易见的结论就是：我们预测的脚的位置，正是下一次出现这个姿势时，脚的所在位置。从Actor坐标来看，到达预测的位置时，脚的Actor坐标 同样是上一次记录的落地时 脚的Actor坐标；</p><p data-pid=\"TpGfcFQj\">简单用例子说明一下就是：如果用于计算的时间表示是从 现在 到 左脚刚落地 的 剩余时间，那么就同样应该用上一次左脚刚落地时候的Actor坐标来作为起始点进行预测；</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-e5c6121bb3368b82d7f139b34c854345_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"2410\" data-rawheight=\"1939\" data-original-token=\"v2-e1d87981a80a1af720d244bf78c44117\" class=\"origin_image zh-lightbox-thumb\" width=\"2410\" data-original=\"https://pic4.zhimg.com/v2-e5c6121bb3368b82d7f139b34c854345_r.jpg\"/></figure><h3>小细节一：动画序列中的一帧不是实际游戏的一帧，在实际运行中可能是3帧4帧5帧，所以需要进行额外的处理使每次循环只记录第一帧的坐标；</h3><h3>小细节二：对于不同的动画，记录时机最好一致，比如都用刚踩下时作为记录点，这样可以减少一点混合时的问题；</h3><h3>小细节三：对角线修正，在进行动画计算时可能对对角线进行了额外的处理，比如ALS中的对角线修正计算，Lyra的Stride Wrapping也可以算在其中；也就是说，这里在预测的时候不要忘了步距处理；</h3><h3>小细节四：计算剩余时间曲线的时候，最好不要将目标设置为脚的水平位置越过root，原因马上说；</h3><h3>个人Trick：计算时难免有误差，预测位置和实际位置即使只有一点点错位，也可能导致后面检测的高度差别较大，这很容易产生动画跳变；我个人在这里给了一个阈值，也就是说如果实际的踩下位置和先前的预测位置出入比较小，那么就直接将预测位置作为新的踩下位置；</h3><h2>二---计算盆骨位置</h2><p data-pid=\"-vPdKpq9\">Shadow佬在这里直接通过设置Mesh来实现盆骨的平滑位移，我也是模仿这个方法来实现的，不过我个人的实现后面再说；</p><p data-pid=\"dzMIUvHh\">计算盆骨的位置，重点在于选择好当前步伐的起始点；当前步伐并不是指某一只脚的运动，而是两条腿共同组成的，如下图所示，角色当前迈出的步子是右脚在后，左脚在前，右脚踩在落地点上，而左脚踩向预测点；</p><p data-pid=\"uC-b-UeX\">因此，当前步伐的起始点是右脚的落地点，终点是左脚的预测点；</p><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-f116e50aa7405a57a95931b235e03343_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2381\" data-rawheight=\"1533\" data-original-token=\"v2-f49fcc330d0a52ff4b729477578ab538\" class=\"origin_image zh-lightbox-thumb\" width=\"2381\" data-original=\"https://pic2.zhimg.com/v2-f116e50aa7405a57a95931b235e03343_r.jpg\"/><figcaption>当前步伐由图中的红线所示</figcaption></figure><p data-pid=\"et5lRwu9\">以此类推，我们可以发现有四种可能的情况；按照 起点---终点 来书写，就是下面的四张图：<br/>1：左脚落脚点---右脚落脚点；</p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-b0c1726e90cb601ee1520f8e0695fb7c_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2496\" data-rawheight=\"1381\" data-original-token=\"v2-82309a6544382d8679b9974fcc80033b\" class=\"origin_image zh-lightbox-thumb\" width=\"2496\" data-original=\"https://pic3.zhimg.com/v2-b0c1726e90cb601ee1520f8e0695fb7c_r.jpg\"/><figcaption>左脚落脚点---右脚落脚点</figcaption></figure><p data-pid=\"j8mq2t4V\">2：右脚落脚点---左脚落脚点；</p><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-4fd9159b2db1c49e9c60b84035276e7e_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2041\" data-rawheight=\"1533\" data-original-token=\"v2-78d7f8e56433f857736071678fb6932d\" class=\"origin_image zh-lightbox-thumb\" width=\"2041\" data-original=\"https://pic1.zhimg.com/v2-4fd9159b2db1c49e9c60b84035276e7e_r.jpg\"/><figcaption>右脚落脚点---左脚落脚点</figcaption></figure><p data-pid=\"LpTfbCaM\">3：右脚落脚点---左脚预测点；</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-e5aea7333f4392b2f70a07b35604a9c1_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2498\" data-rawheight=\"1553\" data-original-token=\"v2-10753a294754be1792878e8425204443\" class=\"origin_image zh-lightbox-thumb\" width=\"2498\" data-original=\"https://pic4.zhimg.com/v2-e5aea7333f4392b2f70a07b35604a9c1_r.jpg\"/><figcaption>右脚落脚点---左脚预测点</figcaption></figure><p data-pid=\"mAUg8RNb\">4：左脚落脚点---右脚预测点；</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-7eacb8097791dbf20895468d004c4869_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2331\" data-rawheight=\"1484\" data-original-token=\"v2-34ec1d791431f8246c544bb763dbbcaf\" class=\"origin_image zh-lightbox-thumb\" width=\"2331\" data-original=\"https://pic4.zhimg.com/v2-7eacb8097791dbf20895468d004c4869_r.jpg\"/><figcaption>左脚落脚点---右脚预测点</figcaption></figure><p data-pid=\"3c7RlhrY\">一共四种可能的前后组合，那么这些组合是在何时切换的呢？经过观察可以发现，有两种情况会导致这些组合发生改变：</p><p data-pid=\"z33rgtbe\">一是有某个脚踩下了，此时该脚所属的预测点成为新的落脚点，并且产生了新的预测点；</p><p data-pid=\"jmYRrqsv\">二是两脚的前后位置发生了改变，比如从左脚前右脚后变成了右脚前左脚后；</p><p data-pid=\"W_CBhG_l\">所以我们只需要在这两种条件触发的时候进行一次判断即可；这就是为什么我在上一步说最好不要将脚过root当做落脚时机来进行进行落地检测处理，脚过root的时机 和 两脚前后位置改变的时机 比较接近甚至重合，可能产生错误；</p><p data-pid=\"Ai3i4a9M\">知道了步伐的起始点，Mesh的插值就比较简单了，我在这里直接使用Mesh的到两个端点的水平距离进行插值；针对上下坡了，插值也有不同的处理，这一段直接看Shadow佬原文即可；</p><h3>个人Trick：这个实现方法非常方便，但是有一个小问题，就是Mesh的位置和脚的实际位置是相对独立的，Mesh的高度通过对步伐起点和终点插值得到，这很容易导致下面的问题：地面变化多时，插值较快则角色上下波动较大，插值较慢则可能Mesh还来不及抬高，脚已经在往上走了，这就导致了盆骨的过度下压或抬升；个人的解决方式在后面会进行介绍，主要是通过脚的位置反向推导Mesh的位置；</h3><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-cf092fa8ebb1df23dce3501d42a52370_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"3327\" data-rawheight=\"1887\" data-original-token=\"v2-abccbc8689ae1b90a3e7d1265fdc06b3\" class=\"origin_image zh-lightbox-thumb\" width=\"3327\" data-original=\"https://pic3.zhimg.com/v2-cf092fa8ebb1df23dce3501d42a52370_r.jpg\"/><figcaption>可能产生的问题</figcaption></figure><h2>三---计算脚的运动路线（实际是增幅路线）FootPath</h2><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-0aa2b5a8535b7c4a9666e3c43020f052_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2512\" data-rawheight=\"1651\" data-original-token=\"v2-8ce69e552522398d6224032b59bfd132\" class=\"origin_image zh-lightbox-thumb\" width=\"2512\" data-original=\"https://pica.zhimg.com/v2-0aa2b5a8535b7c4a9666e3c43020f052_r.jpg\"/><figcaption>实现出来的路径；</figcaption></figure><p data-pid=\"kzjBzINh\">这一步实现起来很简单，以两端为端点进行检测，检测到新的碰撞后再进行迭代，最终得到路径点并整合为数组；由于笨人是美术生，对算法问题就不多BB了，可以直接看Shadow佬原文；</p><h3>小细节：计算出来的路径不是最终脚的运动路径，而是增量路径；具体的后面会说；</h3><h3>个人Trick：这一步检测的碰撞点+脚高就是路径点了，但同样可以针对这些点进行一些额外的艺术处理；打个比方：我给碰撞点额外进行了一点计算，使其距离预测点或者落地点越远，路径点就越高，这样的动画结果会更加好看一点；同样的，由于我们是以两个端点同时向对方进行检测，所以我们理所当然的会进行两个检测节点，一个从预测点出发，一个从落脚点出发；针对两个检测节点的结果进行不同的处理，可以实现更多效果；</h3><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-96828175b511fe7a899b4021d41312de_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2182\" data-rawheight=\"1003\" data-original-token=\"v2-57c5bd90bcb4aab6792a8fedfa2be94c\" class=\"origin_image zh-lightbox-thumb\" width=\"2182\" data-original=\"https://pic1.zhimg.com/v2-96828175b511fe7a899b4021d41312de_r.jpg\"/><figcaption>个人的一些额外处理；</figcaption></figure><h2>四---采样FootPath</h2><p data-pid=\"25AXNcsD\">这一步和上面采样盆骨路线很像，我这里是用ik骨的位置来进行采样，然后就是脚下落时插值更快一点，走路和跑步的插值速度做区分等等；这一段可讲的不多，比较简单；</p><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-6d5e8f8da8a1779f6a3bda00c2ffddfa_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2890\" data-rawheight=\"1567\" data-original-token=\"v2-db423aa1df6e0edf163eac39effa6dad\" class=\"origin_image zh-lightbox-thumb\" width=\"2890\" data-original=\"https://pic1.zhimg.com/v2-6d5e8f8da8a1779f6a3bda00c2ffddfa_r.jpg\"/><figcaption>采样脚的运动路线FootPath</figcaption></figure><p data-pid=\"6rnCkp0l\">这里需要额外说明的是，这个FootPath并不是我们最终的脚的位置，我个人将其作为一个增量来看，怎么理解呢？看下图：</p><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-65e01526c62700a3aa4466bc71f917a4_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2005\" data-rawheight=\"1612\" data-original-token=\"v2-53fd98753ebcd29c259f893c331d7afb\" class=\"origin_image zh-lightbox-thumb\" width=\"2005\" data-original=\"https://pica.zhimg.com/v2-65e01526c62700a3aa4466bc71f917a4_r.jpg\"/><figcaption>FootPath与实际的运动路线对比</figcaption></figure><p data-pid=\"fmrNL6X3\">图中的红线是FootPath，黄线是落地点和预测点的连线，白线才是真正的脚腕的运动路线；</p><p data-pid=\"tXJEP61k\">这样的处理也比较符合我们的直觉，毕竟人类的运动不可能是平平整整的笔直的线；同时，动画师K的动画本身就充满了细节，比如脚抬起时的速度较快，落下较慢，比如脚的最高点不是在两次落地的正中间等等；那么如何保留住这样的信息呢？在这里我的计算方式是，计算FootPath.z-BasePath.z，也就是图中红线相对于黄线的增量，将这个增量叠加到脚的位置上；实现对脚的抬高处理，这里同样可以理解为在FootPath上叠加动画本身的脚抬高程度；</p><p data-pid=\"jniMXmuc\">BasePath.z直接使用Mesh.z+8(脚高)即可；</p><p data-pid=\"NSbBA85j\">但是这个计算方式也有问题，对于走路尚可，因为走路的动画本身的抬高程度不算大，按照上面提到的后者来理解，相当于叠加到FootPath上的抬高程度并不算大；但是对于跑步和冲刺，或者其他抬腿脚高的动画呢？</p><p data-pid=\"jAZuektF\">关于这个点，我个人的处理方式比较简单粗暴：我会先通过当前步伐（前面计算盆骨时候的信息）来判断当前角色是否正在上下坡，对于非上下坡的情况，直接按照原本的计算方式即可，因为FootPath并不大，同时也可以尽可能保持动画原本的姿态；<br/>对于上下坡，我在原本的计算基础上加上了一个 动画本身的抬起高度*系数 ，也就是说对动画本身的抬起高度做一个缩减，使其不要在FootPath的基础上再抬高过多；</p><p data-pid=\"y1ZzgHYv\">这样处理下来，实际的运动动画就还基本能看了，但是上下楼梯仍然是很严重的问题，特别是对于跑步的上下楼梯，我还没有想到什么比较好的调优方法；（叹气）</p><h3>个人Trick：对于FootPath通常要进行平滑处理，但是这会导致一个问题，那就是落地脚可能来不及落地，就被新的FootPath给插值走了；对于这一点，我尝试了给下降的FootPath提高插值速度（前文有提到），但是效果并不明显；反复尝试后发现针对是否踩下进行两种计算比较好；当脚踩下时，将脚的位置插值到预测点/落地点，相当于将该脚锁定到一个定点，而短暂的不去采样新的FootPath；</h3><h2>五---应用ik</h2><p data-pid=\"IpjVhrYv\">这一步就不用多说了，用ControlRig也好，像ALS一样用虚拟骨骼也好，将计算结果应用到动画上即可；</p><h3>小细节：直接修改ik导致结果错误</h3><p data-pid=\"aWOr3EjL\">如果直接将计算的结果设置到ik上，会导致下一帧蓝图读取的ik位置是上一帧计算的结果，而不是按照时间步进的动画位置，这样产生的错误计算又会继续影响下一帧的计算；解决方法就是始终不要设置ik骨，而把ik作为一个参考；</p><p data-pid=\"z_5UL2Jv\">这要怎么理解呢？我们的计算能够实现，一个原因是计算过程不出问题，还有一个就是计算本身的输入不出问题；对于动画来说，就是我们得到的动画信息本身是正确的；</p><p data-pid=\"axt4QhGU\">假如，我们始终用ik的水平位置向下进行射线检测，按理来说，ik本身会随着动画运动，我们的检测结果也是正确的；但如果我们给ik赋值呢？如果我们将ik位置设置为碰撞点，那么，假设第0帧ik位置是(0,0,90)，检测到的碰撞点是(0,0,0)；那么第1帧ik的位置就会被设置成(0,0,0)，碰撞点也会变成(0,0,0)；就这样ik位置始终在原点；</p><p data-pid=\"m7--SFab\">总的来说，就是我们希望获得实际的动画信息，也就是用【动画原生Pose】来进行计算；在预测ik的计算中，我们始终将ik骨的位置认定为会随着时间步进的【动画原生Pose】，但如果给ik进行了额外的设置，就会使ik脱离【动画原生Pose】，而被计算结果覆盖，成为别的信息，这也使其不符合我们新一轮计算的需要；</p><p data-pid=\"8uls0aMo\">解决方法很简单，就是不直接修改ik，而使用其他的骨骼/虚拟骨骼或者控制器作为变量存储变换目标；</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-37a953a9d4f0daf2580eb85f0045791b_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"567\" data-rawheight=\"486\" data-original-token=\"v2-9d96202fbe01a7ee632e28c3ce5f2feb\" class=\"origin_image zh-lightbox-thumb\" width=\"567\" data-original=\"https://pic4.zhimg.com/v2-37a953a9d4f0daf2580eb85f0045791b_r.jpg\"/><figcaption>直接修改ik的错误效果</figcaption></figure><p data-pid=\"7mir-Idj\">（老实说这一段说的有点又臭又长了，不过不写出来感觉有点对不起自己理解这个错误时候的惊喜）</p><h2>到这里为止，脚部预测就已经结束了，后面的内容是我个人的一点见解；</h2><h2>一---盆骨重建</h2><p data-pid=\"m33xH3IP\">前面提到，直接通过当前步伐的前后位置来设置Mesh是一个很不错的方法，但是可能会导致一些错误；前文提到的，平滑插值导致的Mesh的运动延迟于脚部是一种，还有一种问题：</p><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-ce2c0b060b799e01efb6acad38b0ddf4_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2697\" data-rawheight=\"1715\" data-original-token=\"v2-c5d92ab650bf396608476dd6c85b2ded\" class=\"origin_image zh-lightbox-thumb\" width=\"2697\" data-original=\"https://pic1.zhimg.com/v2-ce2c0b060b799e01efb6acad38b0ddf4_r.jpg\"/><figcaption>直接根据步伐设置盆骨高度的一个可能问题</figcaption></figure><p data-pid=\"tCNxgX24\">当角色一只脚在台阶上，一只脚在台阶下时，由于Mesh是左-右-左-右交替插值的，所以会不断的上-下-上-下；但事实上，盆骨的位置往往是由更低的脚来决定的，按照这种路线行进的时候，人不会真的一下站到台阶上，一下又踩到地上；而是会以左脚位置为基础来决定盆骨的高度，也就是始终保持右脚在上，左脚在下，而右脚发力时，左脚会随着右脚有一个抬起，但并不会抬到右脚伸直的程度；</p><p data-pid=\"3SRMmIx1\">简单解决这个问题可以通过插值来实现，但是插值的平滑程度越高，前面提高的问题也会随即提高；而解决问题的关键在于明确一个点，那就是盆骨的位置高低由较低的脚来决定；</p><h3>这样，理所应当的能想到：我们可以通过脚的实际高度来反向求解盆骨的高度；</h3><h3>这里我用了和Shadow佬一样的思路，也就是直接设置Mesh来实现对盆骨的位置设置；那么，整理一下我们已经拥有的条件：</h3><p data-pid=\"y6w7M4jx\">首先是当前帧的双脚FootPath信息，这两个FootPath信息是根据双脚ik的水平位置进行预测和计算最终得到的，与Mesh的高度无关；</p><p data-pid=\"s42_zdWy\">其次是动画原本的Pose信息，我们需要的实际上是Pose内部的相对位置，比如盆骨相对于较低的ik骨的高度，这些也与Mesh的高度无关；</p><p data-pid=\"dTo7EX5W\">这样，看起来我们能直接计算出Mesh的标准位置了；我们只需要得到双脚中较低的那个脚的位置，以及Pose中ik到root的偏移量，这样不就可以直接求出来标准的Mesh位置了吗？</p><p data-pid=\"OM13vcz6\">这样实现出来，会发现整个人运动起来比较抖，跑起来会产生严重错误，比如过度下压；</p><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-661d5c06d5cadf13b22bd174eab16600_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1095\" data-rawheight=\"862\" data-original-token=\"v2-59e026d5a9a02bd2734ac74042b57406\" class=\"origin_image zh-lightbox-thumb\" width=\"1095\" data-original=\"https://pica.zhimg.com/v2-661d5c06d5cadf13b22bd174eab16600_r.jpg\"/><figcaption>错误状态的跑姿</figcaption></figure><p data-pid=\"R8x45CWP\">那么问题出在哪里呢？</p><p data-pid=\"XgMtpm0l\">第二个条件肯定是没问题的，虽然我们得到的Pose来自于上一帧，但是前后两帧的差异可以忽略；</p><p data-pid=\"vvl0EZaG\">那么第一个条件呢？正是这里出现了问题！</p><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-3aeec5e0a218df9c32a447b1988235d8_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1538\" data-rawheight=\"1407\" data-original-token=\"v2-a781d54d058bdb29977cc64e540c4115\" class=\"origin_image zh-lightbox-thumb\" width=\"1538\" data-original=\"https://pica.zhimg.com/v2-3aeec5e0a218df9c32a447b1988235d8_r.jpg\"/><figcaption>前文提到的一处区别</figcaption></figure><p data-pid=\"zC3v-ecz\">我在前面这样写到：FootPath并不是最终的脚的位置，而是一个增量；直截了当的说，就是FootPath是要比实际的脚的位置更低的；因此，直接使用会导致过度的下压；那么解决的关键就是，要怎么才能得到实际的脚的位置呢？</p><p data-pid=\"eKgG1o22\">按照我们前面所说的计算方式，对于走路来说，最终脚腕的高度 = ik_foot.z + FootPath.z - (Mesh.z+8(脚高))，也就是说最终脚腕的高度是依赖于Mesh的，而我们现在又希望用最终的脚腕高度来计算Mesh，这不是矛盾了吗？</p><p data-pid=\"tNLCCPhO\">确实（。。。）；</p><p data-pid=\"K8shvDfs\">不过好在，根据脚部重建盆骨(应该说重建Mesh)计算的结果比较稳定，这使得直接使用前一帧的Mesh高度来计算也看不出来什么问题；</p><p data-pid=\"iPPdzTq3\">那么现在还有一个问题，我们前面还提到，直接用FootPath.z - (Mesh.z+8(脚高)) 来计算增幅，对于一些本身动画的脚就比较高的动画来说，会产生一些错误，所以前面对跑步状态有额外的处理；那在这里统一用FootPath.z - (Mesh.z+8(脚高)) 来计算不会出错吗？</p><p data-pid=\"OMTUPwNI\">答案是：会，但问题不大；这里当然可以用跟最终输出一样的算法来计算，不过就是麻烦点，只是经过测试发现直接使用简单的算法来计算增幅就能实现比较好的Mesh高度了，所以这里投机取巧了一下；</p><h3>总的来说，就是将实际的较低脚作为基础，根据该脚位置和 动画本身的较低脚相对于root的偏移量，反向求得Mesh的更合理高度；对于这个结果，可以用弹簧插值实现更加稳定的效果；</h3><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-6044eff8344578d6a5799793c631ca37_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"3840\" data-rawheight=\"2160\" data-original-token=\"v2-8e497864ecdb2c2a1bb87e68626cf6bb\" class=\"origin_image zh-lightbox-thumb\" width=\"3840\" data-original=\"https://pic4.zhimg.com/v2-6044eff8344578d6a5799793c631ca37_r.jpg\"/><figcaption>曲线图是盆骨重建优化的效果；</figcaption></figure><p data-pid=\"1u5NJJ_J\">本文封面图中的曲线图正是这一计算的Debug，绿色是标准的动画中的盆骨到较低脚的距离，黄色是优化前的盆骨到较低脚的距离，红色插值优化后的距离；再之后完全使用了盆骨重建来代替之前的做法，这个Debug也用不了了（可怜我花一大把时间做这个Debug。。。）</p><p data-pid=\"ZF6QuEX-\">在最后说一个小问题，就是这个重建计算中，用的是动画较低脚的信息和实际较低脚的信息用作计算，这两个脚实际上不一定是同一个脚；大多数情况下，动画本身的较低脚是发力脚，但实际输出的较低脚可不一定是发力脚；不过测试下来并没有出现很多问题，唯一的问题是下楼的时候，下楼时的实际较低脚是放松的，而较高脚是发力的；但是用这个计算方式会根据较低脚来确定盆骨的高度，导致较低脚，也就是抬起的那只脚反而有点过度的拉伸；其实上楼也是这个问题，就是位于较低位置的脚拉伸；但上楼的表现倒是没什么异常，可能是因为上楼时候的较低脚拉伸了也问题不大；这个解决方法很简单，当上下楼的时候稍微降一点点盆骨高度就行，这里我给下楼降了8cm，上楼也顺手降了5cm，效果就会好一些；</p><h2>二---坡面匹配</h2><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-ccaa599947019798a147b202dc135718_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1587\" data-rawheight=\"1722\" data-original-token=\"v2-9ca493cec3eb468df189aea1df6b4a7b\" class=\"origin_image zh-lightbox-thumb\" width=\"1587\" data-original=\"https://pic1.zhimg.com/v2-ccaa599947019798a147b202dc135718_r.jpg\"/><figcaption>脚底贴合坡面</figcaption></figure><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-b6f7fbdb57533d08da20e237cb87974e_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1434\" data-rawheight=\"1711\" data-original-token=\"v2-4b4991b7c895d4ac1b168b6c39a9d65d\" class=\"origin_image zh-lightbox-thumb\" width=\"1434\" data-original=\"https://pic3.zhimg.com/v2-b6f7fbdb57533d08da20e237cb87974e_r.jpg\"/><figcaption>脚底贴合坡面</figcaption></figure><p data-pid=\"bfMC7rfS\">这个实现起来相对容易，我是直接修改了Lyra的Control Rig连在后面；对于落地脚，按照ALS的计算方式修正脚腕位置并且通过Aim Math计算并设置脚腕的旋转，然后重新解算IK；当然像ALS那样直接正交分解一步到位，然后和前面的部分合在一起也是OK的，我这里是图方便省事才又连了个Control Rig在后面；</p><p data-pid=\"VYtovDsc\">不过吐槽一下，真的丑；也许人类走这种斜面本身就很怪异；</p><h2>三---预测IK与传统IK结合</h2><p data-pid=\"k2MNqUeL\">老实说，除了循环动画，预测IK都很容易出岔子；所以我在这选择将非循环运动状态都使用传统IK来实现，而循环动画的部分使用预测IK，通过Modify Curve来进行切换；</p><p data-pid=\"Y26xRK4v\">传统IK在Idle状态还是会效果更好一点；并且传统IK也有很多实现方式了，相对来说也更稳定；</p><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-0c18c99e986622e28d1fb350e80c1267_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2382\" data-rawheight=\"1848\" data-original-token=\"v2-bd5e38fa40a95c4f700ac1c61a0f297b\" class=\"origin_image zh-lightbox-thumb\" width=\"2382\" data-original=\"https://pic2.zhimg.com/v2-0c18c99e986622e28d1fb350e80c1267_r.jpg\"/><figcaption>传统IK</figcaption></figure><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-e7787bfb5e581932666c85e0a85746be_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2114\" data-rawheight=\"1830\" data-original-token=\"v2-e54e17a8af3ee5deb117c67bee1f9225\" class=\"origin_image zh-lightbox-thumb\" width=\"2114\" data-original=\"https://pic1.zhimg.com/v2-e7787bfb5e581932666c85e0a85746be_r.jpg\"/><figcaption>传统IK</figcaption></figure><h2>四---上下楼</h2><p data-pid=\"fIb6wwO4\">做预测IK的这几天，我感觉自己起码上下楼了五百次。。。</p><p data-pid=\"GE2lTXT9\">不过仍然没有发现什么好的方法，除非直接使用上下楼动画；如果硬要直接用走跑动画上下楼的话，走路尚且能看，跑步就很难受了；不过还是分享一下目前发现的相对合理的方法（不过极有可能是废话）：</p><h3>一---降低速度，缩短步距</h3><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-4d833f8eade3c6544fd2db4ac28d2857_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"2278\" data-rawheight=\"1749\" data-original-token=\"v2-96c5379d4f233e77a71868acc10ff447\" class=\"origin_image zh-lightbox-thumb\" width=\"2278\" data-original=\"https://picx.zhimg.com/v2-4d833f8eade3c6544fd2db4ac28d2857_r.jpg\"/><figcaption>缩短步距后</figcaption></figure><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-1133f113f6a03ced4aec6dce6cf4466d_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1926\" data-rawheight=\"1663\" data-original-token=\"v2-62ad570f3f48edd14ccea141f096b7da\" class=\"origin_image zh-lightbox-thumb\" width=\"1926\" data-original=\"https://pic4.zhimg.com/v2-1133f113f6a03ced4aec6dce6cf4466d_r.jpg\"/><figcaption>缩短步距前</figcaption></figure><p data-pid=\"zVfzwq5v\">主要就是缩短步距，不要大跨步上下楼，直接降低移速并且配合Stride Wrap，或者手动混合一下动画缩短步距；使每一步的距离和楼梯的宽度差不多；</p><h3>二---上楼和下楼的盆骨高度做一点调整</h3><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-836426373ee2f2e4323b6063139cc8d6_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1715\" data-rawheight=\"1695\" data-original-token=\"v2-9a0ef383d2a8f11cc730b61e3a6be765\" class=\"origin_image zh-lightbox-thumb\" width=\"1715\" data-original=\"https://pic1.zhimg.com/v2-836426373ee2f2e4323b6063139cc8d6_r.jpg\"/><figcaption>下楼盆骨相对较低</figcaption></figure><p data-pid=\"Wbams5Yk\">前面提到，上下楼的时候盆骨会稍微降一点，其中下楼的盆骨要相对低一些，上楼高一点</p><h3>三---针对性优化FootPath</h3><p data-pid=\"lXk_F5Vo\">这一点也是前面提到的，FootPath上也可以做一些文章；拿我自己的做法来说，我给上楼时的FootPath的后半段额外的增加了高度，这样可以使脚抬得高一点，同时给跑步状态下的整体提升了高度；（不过跑上楼还是很难受）</p><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-1d2aa59bf3826b095e002032ee192c4d_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1390\" data-rawheight=\"1026\" data-original-token=\"v2-9696e26441b4a5579bb12ab499e3329e\" class=\"origin_image zh-lightbox-thumb\" width=\"1390\" data-original=\"https://pic2.zhimg.com/v2-1d2aa59bf3826b095e002032ee192c4d_r.jpg\"/><figcaption>单独优化FootPath</figcaption></figure><h3>四---改用专门的上下楼动画</h3><h3>五---别死磕，累了就休息吧</h3><p data-pid=\"K-_kGCCV\">累了就休息吧；</p><h2>仍然需要解决的问题：</h2><h3>一---多个动画混合时预测不准</h3><p data-pid=\"-21-LUYB\">尽可能把各项数据对齐，特别是一开始提到的，对于什么动作定义为踩下一定要明确清楚；</p><h3>二---检测错误/未检测到/进入传统IK导致数据没有同步</h3><p data-pid=\"zZBGSrUE\">对于这一块我是人肉Debug和打补丁的哎</p><h3>三---一个预想/给自己画饼：水平方向的主动校正</h3><p data-pid=\"E7y8cFNA\">既然预测到了下一次的落点，那么有没有可能在落地基础上进行偏移，使结果更进一步？比如每次上楼梯都踩在中心位置？比如当只有脚趾/脚腕才在台阶上的时候会主动校正？</p><h3>四---落地脚不能踩实</h3><p data-pid=\"LdjdN5HD\">虽然给了一个落地脚下沉的处理，但是对于跑步之类的动作，落地的时间特别短，根本来不及沉下去；</p><h3>五---穿墙脚/穿墙腿问题</h3><p data-pid=\"yDOcUrbw\">虽然在实现中有处理，但是往往要么直接把穿墙脚偏移出来，要么插值出来，效果欠佳；</p><h3>六---有没有更加好的方法？</h3><h2>总结</h2><p data-pid=\"Ew2hdVKN\">预测IK的基本框架实现起来还是比较简单的，但是调优落地要比实现难得多；现在是2026.1.12 1:14，从新建文件夹到写完文章已经整整一周了；实际上预测IK的实现只花了2天，可是后续的调整，修改原比想象的要复杂许多；到现在为止仍然有很多问题需要解决；怎么说呢，常怀敬畏，继续前进吧；</p><p data-pid=\"e6GljfMH\">最后介绍一下自己，我是2028届的本科生纸橙，目标是美术向TA和技术动画，如果有实习需求请务必要考虑我！！</p><h2>参考文章</h2><p data-pid=\"oI75ZxG3\"><a href=\"https://zhuanlan.zhihu.com/p/679650155\" class=\"internal\" target=\"_blank\">【UE5】预测脚步IK实现-PredictFootIK</a></p><p data-pid=\"lyp4HuZG\"><a href=\"https://zhuanlan.zhihu.com/p/1986534266255996353\" class=\"internal\" target=\"_blank\">【UE5】Predicted IK 简单尝试</a></p><p class=\"ztext-empty-paragraph\"><br/></p><p data-pid=\"jePxJiEJ\">=======================================================</p><p data-pid=\"hKzFeixZ\">=======================================================</p><p data-pid=\"yy7AYhK9\">|||分割线|||</p><p data-pid=\"iU0ndUxa\">=====================================================================================================================================================================</p><h2>2026.2.28更新：</h2><p data-pid=\"eKdx0LgC\">过完年一直在找实习，年前也整理了一下作品集，在整理的过程中和面试中有发现一些新的问题，有些问题没有来得及修（也可能是不知道怎么修），不过还是在这里分享一下吧：</p><h3>1 - 关于盆骨重建的问题和BUG：</h3><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-91b0eeb05d9e1b141cf33afc5b190897_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"900\" data-rawheight=\"191\" data-original-token=\"v2-36bb8ccdef0ceba5c6e0c649d6d935d3\" class=\"origin_image zh-lightbox-thumb\" width=\"900\" data-original=\"https://pic4.zhimg.com/v2-91b0eeb05d9e1b141cf33afc5b190897_r.jpg\"/><figcaption>前文中的一段内容</figcaption></figure><p data-pid=\"dI73cqqb\">前文中提到，盆骨的位置根据脚的位置计算，并且这里直接使用的是这样一个简单的计算方式，并且能达到不错的效果。</p><p data-pid=\"Q2XADF22\">但是在后续的计算中发现这其实一种巧合的情况，也就是刚好这种简单的估算能达到目的；反而使用“跟最终输出一样的算法”来计算可能出现角色Mesh飞的特别高/掉的特别低的BUG，虽然我想明白了大概原因，但是还没有找到合理的解法；</p><p data-pid=\"SaKYB1hE\">拿“飞的特别高”的情况来说，原因大概是：FootPath相较于原路径有抬升 ---&gt; 计算出来的脚位置导致Mesh抬高 ---&gt; Mesh抬高导致ik_foot抬高 ---&gt; 错误抬高后的ik_foot再Additive上FootPath抬升量，导致结果出现偏差并且错误不断累积；</p><p data-pid=\"4tRQ6C24\">大概是这么个问题，不过我还没有找到好的解决方法；</p><p data-pid=\"-clVGrna\">取消掉前面的Additive方法，直接将foot设置到计算出来的FootPath+动画抬脚高度 的位置上？不过这种方式会导致下半身动画表现有一点拖沓的感觉，特别是当落地脚将要抬起时，会感觉腿拉伸得过直才抬起迈步子；这是因为获得的“动画抬脚高度”是前一帧的信息；</p><p data-pid=\"a7qqv0Zx\">给错误抬高的ik_foot再反向偏移一个Mesh抬升量？这种方式做出来的结果也并不太好；</p><p data-pid=\"GO0CjQmW\">就这样反反复复试验了两天，最后我的做法是回退版本，仍然使用前文提到的简单算法。。。；（看到这里的读者估计要骂我了。。。）</p><p data-pid=\"3maV1Ea1\">不得不感慨一下，偷懒出来的结果反而更优。。。；</p><h3>2 - 陡坡上的动画表现：</h3><p data-pid=\"YYPxiRxN\">其实这一点，前文的配图就初见端倪了；</p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-d937335716dfc6f8bf26cefa2ad5ab60_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"914\" data-rawheight=\"1079\" data-original-token=\"v2-270a980bf6662377655f32f0a3af169d\" class=\"origin_image zh-lightbox-thumb\" width=\"914\" data-original=\"https://pic3.zhimg.com/v2-d937335716dfc6f8bf26cefa2ad5ab60_r.jpg\"/><figcaption>前文中的图片</figcaption></figure><p data-pid=\"kL_rQS35\">从这个图片中可以发现，左脚脚腕折叠程度过大，导致出现了很不舒服的动画表现；而对于更大角度，这种问题会更大；</p><p data-pid=\"CmaVGccR\">这个问题比较明显，就是因为完全令脚底贴合地面了，而很多情况下只需要前脚掌贴合地面即可；目前我想到的解决方式有两种：</p><p data-pid=\"7rf6FmcM\">第一种是判断折叠角度或者判断脚底法线，然后将脚腕抬起一定的高度，只令前脚掌贴合地面；</p><p data-pid=\"Uc-rJt12\">第二种是将ik链的一端从脚腕换到脚掌，不过这种方法会使ik解算不再是简单的双骨骼ik，需要额外添加约束；</p><p class=\"ztext-empty-paragraph\"><br/></p><p data-pid=\"ZatK1aPt\">还有一个问题，就是上半身没有对运动做出反应。在文章发出后，finding佬在评论区解释：“斜面向下的问题是，感觉到不自然。没人下坡的时候是那样，一般整个身体都会前倾。”是的，这也是一个我没有注意到的点；除了腿部对地形产生响应（也就是本文的内容）以外，上半身也应该产生响应，比如上下坡时候的胸腔与头部的俯仰，以及重心的略微偏移等等；</p><h3>3 - 从空中落地时产生错误：</h3><p data-pid=\"pb1HyPwZ\">解决方法很简单，在空中时重置参数，并且落地一定时间内使用传统ik而不使用预测ik；</p><h3>碎碎念：</h3><p data-pid=\"SeoNkbXf\">这次的更新/补丁就到这里了，也算是我自己的一次复习与反思吧；本文发布后收到了很多鼓励与认可，有不少同学联系我询问一些实现细节，甚至有找我要原工程的（虽然我自己对这个不算完善的东西没有太大的信心），实在是受宠若惊；总之，感谢大家的喜欢，希望这次更新能为大家提供更多的帮助，也祝我自己面试顺利；</p>", "contentNeedTruncated": false, "forceLoginWhenClickReadMore": false, "adminClosedComment": false, "topics": [], "voteupCount": 97, "voting": 0, "heavyUpStatus": "allow_heavy_up", "commentCount": 8, "contributions": [], "isTitleImageFullScreen": false, "upvotedFollowees": [], "commercialInfo": {"isCommercial": false, "plugin": {}}, "suggestEdit": {"status": false, "reason": "", "tip": "", "url": "", "title": ""}, "reason": "", "annotationAction": [], "canTip": false, "tipjarorsCount": 0, "isLabeled": false, "hasPublishingDraft": false, "isFavorited": true, "favlistsCount": 257, "isNormal": true, "status": 0, "activity
