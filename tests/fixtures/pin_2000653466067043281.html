<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script id="js-initialData" type="text/json">{"initialState":{"entities":{"pins":{"2000653466067043281":{"id":"2000653466067043281","type":"pin","state":"normal","url":"https://www.zhihu.com/pin/2000653466067043281?native=0","viewPermission":"all","sourcePinId":0,"created":1769775541,"updated":1769783009,"isDeleted":false,"selfCreate":false,"commentPermission":"all","canTop":false,"isTop":false,"isAdminCloseRepin":false,"adminClosedComment":false,"meetReactionGuideConditions":false,"likeCount":5,"commentCount":1,"repinCount":0,"reactionCount":5,"favoriteCount":24,"favlistsCount":24,"pageViewCount":null,"content":[{"title":"","content":"卡兹克大佬分享的 5 个被精心优化的 AI 提示词，对于管理、学习、创业很实用 | 不知道大家有没有对提示词技巧疲劳了哈哈。<br><br>但就算疲劳，我今日还是要推荐这几个，因为 AI 会放大高手成高高手，菜鸟成更菜的鸟。<br><br>因此看看大佬卡兹克 <a href=\"https://link.zhihu.com/?target=https%3A//x.com/Khazix0918/status/2011640679030800785\" data-insert-way=\"force\" data-draft-node=\"inline\" data-draft-type=\"text-link\" data-draft-title=\"链接\" class=\"external\" data-icon-type=\"link\" data-original-url=\"https://x.com/Khazix0918/status/2011640679030800785\" data-icon-name=\"zhicon_icon_24_link\">链接</a>  的提示词，而且是被精心优化过的，必然有很大益处的。<br><br>我挨个试了下，做出了删改，以及一些心得：<br><br>- - - - - - - -<br><br>第一个、设定 AI 的角色！<br><br>因为大语言 AI 模型本身就是虚拟机，系统默认的角色太泛能力，最好是给它指定个角色，让他模拟他的大脑去思考你的问题，比如乔布斯。<br><br>当然最好是你能指定，但如果你也不知道，那就让 AI 去选：<br><br>⚠️ 提示词：你先选一个最合适的很厉害的专家的大脑来思考我的问题。名字可以不有名，但是他在这个小领域一定很专业（it 类问题，海外大佬略微优先）。如果你不确定选谁，你可以先问我两个问题，然后再选。（100字以内回复）我想问【图形学】里面的【如何进行实例化的优化类的问题】。<br><br>- - - - - - - -<br><br>第二个、苏格拉底式追问！<br><br>什么是苏格拉底追问呢？<br><br>就好像 树上 3 只鸟，猎人开枪打死一只，还有几只鸟？一样，让数学家回答，数学家会询问很多问题，比如鸟瞎吗？鸟聋吗？鸟是死的吗？树有多大..... 等把握。<br><br>这个相当重要！因为 AI 的知识面比你大数千倍，它能问出你未知的但可能关键的问题。<br><br>下面的提示词，来源于 Reddit上 imthemissy 大佬的思路：<br><br>⚠️提示词：请你在回答前，先问我问题。要求：一次只问一个问题。根据我的回答，继续追问。直到你有95%的信心理解我的真实需求和目标。然后才给出方案。我的问题是【树上 3 只鸟，猎人开枪打死一只，还有几只鸟？】！<br><br>注意，这个 95% 是多轮实验后的最佳值，保证高可用性，又避免无尽循环。<br><br>- - - - - - - -<br><br>第三个、防 AI 「舔狗」法！<br><br>由于 AI 公司定调都是乐观的主旋律，它们给你定计划，默认是乐观态度。<br><br>我们人也喜欢乐观。<br><br>So，一不小心，两者合体，啪啪做出一些不实用的计划，造成损失。<br><br>因此需要提前预演失败。这个精心调教过的提示词，对于企业管理层，非常好用！避免可怕的认知盲区！给你补充很多珍贵的角度。<br><br>⚠️提示词：请假设我的某个项目到时候失败了拉了大跨。然后回答：什么时间点开始出现衰退信号？最致命的决策错误是什么？你忽视的核心风险是什么？如果能重来，第一个应该改的是什么？要求：写一篇&#34;失败复盘文章&#34;，要基于真实的类似项目失败案例。我的项目是：【我现在要做小程序，是一个为本地十几家饭馆高度定制的个性化餐饮点餐系统，已签合同和定金。】<br><br>- - - - - - - -<br><br>第四个、辩论式学习法！<br><br>其实也是防止 AI 的「舔狗」型默认设置。因为AI的谄媚效应实在太强了，在你没有刻意引导的情况下，会经常顺着你说，导致很多的问题，你没有办法对自己进行客观的判断。<br><br>⚠️提示词：我马上要参加一场辩论赛，会有很多人来挑战我的观点，这个理论必须变得无懈可击。 如果你是一个学者，你需要用尽一切论据、细节和逻辑，来挑战我、反驳我，你的唯一目标，就是证明我是错的。你会怎么反驳呢？你的唯一目标，就是证明我是错的。你会怎么反驳呢？我的观点是【对于个人小项目，next.js 比 PHP 更好用！】<br><br>- - - - - - - -<br><br>第五个、双层解释法！<br><br>我们日常学习，会遇到很多我们不熟悉的领域。<br><br>我们会下意识，让 AI 使用小学生能听懂的话给我们解释。<br><br>但是这不利于我们的后续学习。<br><br>因此最好出俩版本，【初学者版本】和【专家版本】。<br><br>两个版本对照着学。<br><br>初学者的较优实践角色是洗脚城大爷，防止语言过度幼稚，让人觉得像哄小孩，不喜欢。<br><br>⚠️提示词：请用两种方式进行回答：1. 初学者版本：面向对象是洗脚城的大爷，用大爷也能听得懂的话语为他进行详细解释。2. 深度专业版本： 面向对象是专业人群，一定不能出现事实错误。请帮我解释一下【AI 领域的残差连接】。<br><br> <a class=\"hash_tag\" href=\"https://www.zhihu.com/topic/21260455\" data-pin-topic=\"zhihu://topic/21260455/pin20\">#人生智慧</a> ","foldType":"raw","ownText":"卡兹克大佬分享的 5 个被精心优化的 AI 提示词，对于管理、学习、创业很实用 | 不知道大家有没有对提示词技巧疲劳了哈哈。<br><br>但就算疲劳，我今日还是要推荐这几个，因为 AI 会放大高手成高高手，菜鸟成更菜的鸟。<br><br>因此看看大佬卡兹克 <a href=\"https://link.zhihu.com/?target=https%3A//x.com/Khazix0918/status/2011640679030800785\" data-insert-way=\"force\" data-draft-node=\"inline\" data-draft-type=\"text-link\" data-draft-title=\"链接\" class=\"external\" data-icon-type=\"link\" data-original-url=\"https://x.com/Khazix0918/status/2011640679030800785\" data-icon-name=\"zhicon_icon_24_link\">链接</a>  的提示词，而且是被精心优化过的，必然有很大益处的。<br><br>我挨个试了下，做出了删改，以及一些心得：<br><br>- - - - - - - -<br><br>第一个、设定 AI 的角色！<br><br>因为大语言 AI 模型本身就是虚拟机，系统默认的角色太泛能力，最好是给它指定个角色，让他模拟他的大脑去思考你的问题，比如乔布斯。<br><br>当然最好是你能指定，但如果你也不知道，那就让 AI 去选：<br><br>⚠️ 提示词：你先选一个最合适的很厉害的专家的大脑来思考我的问题。名字可以不有名，但是他在这个小领域一定很专业（it 类问题，海外大佬略微优先）。如果你不确定选谁，你可以先问我两个问题，然后再选。（100字以内回复）我想问【图形学】里面的【如何进行实例化的优化类的问题】 最好出俩版本，【初学者版本】和【专家版本】。<br><br>两个版本对照着学。<br><br>初学者的较优实践角色是洗脚城大爷，防止语言过度幼稚，让人觉得像哄小孩，不喜欢。<br><br>⚠️提示词：请用两种方式进行回答：1. 初学者版本：面向对象是洗脚城的大爷，用大爷也能听得懂的话语为他进行详细解释。2. 深度专业版本： 面向对象是专业人群，一定不能出现事实错误。请帮我解释一下【AI 领域的残差连接】。<br><br> <a class=\"hash_tag\" href=\"https://www.zhihu.com/topic/21260455\" data-pin-topic=\"zhihu://topic/21260455/pin20\">#人生智慧</a> ","contentHtml":"<div>卡兹克大佬分享的 5 个被精心优化的 AI 提示词，对于管理、学习、创业很实用 | 不知道大家有没有对提示词技巧疲劳了哈哈。<br/><br/>但就算疲劳，我今日还是要推荐这几个，因为 AI 会放大高手成高高手，菜鸟成更菜的鸟。<br/><br/>因此看看大佬卡兹克 <a href=\"https://link.zhihu.com/?target=https%3A//x.com/Khazix0918/status/2011640679030800785\" data-insert-way=\"force\" data-draft-node=\"inline\" data-draft-type=\"text-link\" data-draft-title=\"链接\" class=\"external\" data-icon-type=\"link\" data-original-url=\"https://x.com/Khazix0918/status/2011640679030800785\" data-icon-name=\"zhicon_icon_24_link\">链接</a>  的提示词，而且是被精心优化过的，必然有很大益处的。<br/><br/>我挨个试了下，做出了删改，以及一些心得：<br/><br/>- - - - - - - -<br/><br/>第一个、设定 AI 的角色！<br/><br/>因为大语言 AI 模型本身就是虚拟机，系统默认的角色太泛能力，最好是给它指定个角色，让他模拟他的大脑去思考你的问题，比如乔布斯。<br/><br/>当然最好是你能指定，但如果你也不知道，那就让 AI 去选：<br/><br/>⚠️ 提示词：你先选一个最合适的很厉害的专家的大脑来思考我的问题。名字可以不有名，但是他在这个小领域一定很专业（it 类问题，海外大佬略微优先）。如果你不确定选谁，你可以先问我两个问题，然后再选。（100字以内回复）我想问【图形学】里面的【如何进行实例化的优化类的问题】。<br/><br/>- - - - - - - -<br/><br/>第二个、苏格拉底式追问！<br/><br/>什么是苏格拉底追问呢？<br/><br/>就好像 树上 3 只鸟，猎人开枪打死一只，还有几只鸟？一样，让数学家回答，数学家会询问很多问题，比如鸟瞎吗？鸟聋吗？鸟是死的吗？树有多大..... 等把握。<br/><br/>这个相当重要！因为 AI 的知识面比你大数千倍，它能问出你未知的但可能关键的问题。<br/><br/>下面的提示词，来源于 Reddit上 imthemissy 大佬的思路：<br/><br/>⚠️提示词：请你在回答前，先问我问题。要求：一次只问一个问题。根据我的回答，继续追问。直到你有95%的信心理解我的真实需求和目标。然后才给出方案。我的问题是【树上 3 只鸟，猎人开枪打死一只，还有几只鸟？】！<br/><br/>注意，这个 95% 是多轮实验后的最佳值，保证高可用性，又避免无尽循环。<br/><br/>- - - - - - - -<br/><br/>第三个、防 AI 「舔狗」法！<br/><br/>由于 AI 公司定调都是乐观的主旋律，它们给你定计划，默认是乐观态度。<br/><br/>我们人也喜欢乐观。<br/><br/>So，一不小心，两者合体，啪啪做出一些不实用的计划，造成损失。<br/><br/>因此需要提前预演失败。这个精心调教过的提示词，对于企业管理层，非常好用！避免可怕的认知盲区！给你补充很多珍贵的角度。<br/><br/>⚠️提示词：请假设我的某个项目到时候失败了拉了大跨。然后回答：什么时间点开始出现衰退信号？最致命的决策错误是什么？你忽视的核心风险是什么？如果能重来，第一个应该改的是什么？要求：写一篇&#34;失败复盘文章&#34;，要基于真实的类似项目失败案例。我的项目
