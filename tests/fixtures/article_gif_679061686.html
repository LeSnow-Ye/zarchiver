大学 计算机科学硕士", "mergedBadges": [{"type": "identity", "detailType": "identity_people", "title": "认证", "description": "墨尔本大学 计算机科学硕士", "url": "https://zhuanlan.zhihu.com/p/96956163", "sources": [], "icon": "", "nightIcon": "", "badgeStatus": "passed"}], "detailBadges": [{"type": "identity", "detailType": "identity_people", "title": "已认证的个人", "description": "墨尔本大学 计算机科学硕士", "url": "https://zhuanlan.zhihu.com/p/96956163", "sources": [], "icon": "https://pic1.zhimg.com/v2-2ddc5cc683982648f6f123616fb4ec09_l.png?source=32738c0c", "nightIcon": "https://pica.zhimg.com/v2-2ddc5cc683982648f6f123616fb4ec09_l.png?source=32738c0c", "badgeStatus": "passed"}], "icon": "https://picx.zhimg.com/v2-2ddc5cc683982648f6f123616fb4ec09_l.png?source=32738c0c", "nightIcon": "https://pic1.zhimg.com/v2-2ddc5cc683982648f6f123616fb4ec09_l.png?source=32738c0c"}, "exposedMedal": {"medalId": "1454099125259759616", "medalName": "我的知乎 2021", "avatarUrl": "https://picx.zhimg.com/v2-431120b3fe5feeabe1492d124b33317e_r.png?source=172ae18b", "miniAvatarUrl": "https://pic1.zhimg.com/v2-431120b3fe5feeabe1492d124b33317e_l.png?source=172ae18b", "description": "参与「我的知乎 2021」即可获得", "medalAvatarFrame": ""}}, "commentPermission": "all", "copyrightPermission": "need_review", "state": "published", "ipInfo": "北京", "imageWidth": 1920, "imageHeight": 1080, "content": "<p data-pid=\"nHJddGZL\">随着猛兽派对Party Animals上线，角色物理动画又被提到大众面前，为这款游戏玩法增添异彩，产生了很多意想不到的滑稽效果。</p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-452d87189b50703f507e49c34bec36a4_1440w.gif\" data-size=\"normal\" data-rawwidth=\"799\" data-rawheight=\"423\" data-thumbnail=\"https://pic3.zhimg.com/v2-452d87189b50703f507e49c34bec36a4_b.jpg\" data-original-token=\"v2-452d87189b50703f507e49c34bec36a4\" class=\"origin_image zh-lightbox-thumb\" width=\"799\" data-original=\"https://pic3.zhimg.com/v2-452d87189b50703f507e49c34bec36a4_r.jpg\"/><figcaption>猛兽派对</figcaption></figure><h2><b>角色物理动画是什么？</b></h2><p data-pid=\"ZhoB9eOJ\">传统游戏中角色动画往往是通过关键帧加状态逻辑的方式进行动画处理，在复杂环境下无法有很好的交互，甚至出现穿模等现象。角色物理动画Physically Based Character Animation（或称Active Ragdoll），是融合了关键帧动画与布娃娃物理的程序动画方式，原理上是给角色配置布娃娃物理模拟（刚体+关节约束），并根据需求让刚体和关节约束追随关键帧动画的运动，因此它能实现角色当前状况下动画语义的同时又能与外界产生物理交互。</p><ol><li data-pid=\"fUo2Ja-A\">增加游戏趣味性、增加玩法</li></ol><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-5a5e829dddd2a72ded3c17477a7e03da_1440w.gif\" data-size=\"normal\" data-rawwidth=\"636\" data-rawheight=\"373\" data-thumbnail=\"https://pica.zhimg.com/v2-5a5e829dddd2a72ded3c17477a7e03da_b.jpg\" data-original-token=\"v2-5a5e829dddd2a72ded3c17477a7e03da\" class=\"origin_image zh-lightbox-thumb\" width=\"636\" data-original=\"https://pica.zhimg.com/v2-5a5e829dddd2a72ded3c17477a7e03da_r.jpg\"/><figcaption>Gang beasts X佬大乱斗</figcaption></figure><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-60c3bb0eb0e22890597722ee7794dbc3_1440w.gif\" data-size=\"normal\" data-rawwidth=\"480\" data-rawheight=\"269\" data-thumbnail=\"https://pic2.zhimg.com/v2-60c3bb0eb0e22890597722ee7794dbc3_b.jpg\" data-original-token=\"v2-60c3bb0eb0e22890597722ee7794dbc3\" class=\"origin_image zh-lightbox-thumb\" width=\"480\" data-original=\"https://pic2.zhimg.com/v2-60c3bb0eb0e22890597722ee7794dbc3_r.jpg\"/><figcaption>Human Fall Flat 人类一败涂地</figcaption></figure><p data-pid=\"RofVRDTI\">2. 增强动画质量与真实感</p><figure data-size=\"normal\"><img src=\"https://pic4.zhimg.com/v2-a14f5f7a992e85d1f60aae44036e8317_1440w.gif\" data-size=\"normal\" data-rawwidth=\"400\" data-rawheight=\"220\" data-thumbnail=\"https://pic4.zhimg.com/v2-a14f5f7a992e85d1f60aae44036e8317_b.jpg\" data-original-token=\"v2-a14f5f7a992e85d1f60aae44036e8317\" class=\"content_image\" width=\"400\"/><figcaption>Uncharted 神秘海域</figcaption></figure><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-cd3b0b10f5f8ef88242503501cbd458e_1440w.gif\" data-size=\"normal\" data-rawwidth=\"400\" data-rawheight=\"204\" data-thumbnail=\"https://pic3.zhimg.com/v2-cd3b0b10f5f8ef88242503501cbd458e_b.jpg\" data-original-token=\"v2-cd3b0b10f5f8ef88242503501cbd458e\" class=\"content_image\" width=\"400\"/><figcaption>The last of us最后生还者</figcaption></figure><p data-pid=\"UBuWWGo7\">3. 提升互动沉浸感</p><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-324dbe31c6d3b40b06b5152283c25a0a_1440w.gif\" data-size=\"normal\" data-rawwidth=\"400\" data-rawheight=\"308\" data-thumbnail=\"https://pic1.zhimg.com/v2-324dbe31c6d3b40b06b5152283c25a0a_b.jpg\" data-original-token=\"v2-324dbe31c6d3b40b06b5152283c25a0a\" class=\"content_image\" width=\"400\"/><figcaption>上古卷轴 VR 物理Mod</figcaption></figure><p data-pid=\"By9wdOsc\">另外，还有一些地方角色物理动画指的是用物理的方式模拟关节Motor以驱动角色，也就是说是通过构造控制器以控制角色关节扭矩，使其产生期望的动作，DeepMimic是其中一个代表。和我们的文章所指的技术是不同的（最大差别在于我们文中的物理动画技术是必须有一个关键帧动画作为参考），大家可以移步看其他大佬的文章。</p><h2><b>基本原理</b></h2><h3><b>布娃娃物理模拟</b></h3><p data-pid=\"-PxYuZTY\">物理动画的主要原理与布娃娃物理有关，布娃娃物理系统最初主要被应用在角色死亡，及受伤的场面上（开始于1992年重返侏罗纪），角色在死亡时候会模拟物理情况进行动画表现。 现在大部分布娃娃物理的主要实现是基于多个刚体和相应约束组成，刚体往往与角色的骨骼是对应的，且刚体之间会通过约束相连接。</p><figure data-size=\"normal\"><img src=\"https://pic1.zhimg.com/v2-6ff38fc49bf6702776018b797ba8cfa0_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"221\" data-rawheight=\"333\" data-original-token=\"v2-3ad97dcb59ec7780db0a365d8d04575e\" class=\"content_image\" width=\"221\"/></figure><h3><b>刚体</b></h3><p data-pid=\"uVYhkZVc\">刚体指的一个刚性的物体（即它们在外力作用下不会变形，因此流体、弹性、塑性变形等不是刚体），一般刚体有六个维度的自由度，三个旋转pitch yaw roll+三个位移xyz。</p><h3><b>关节约束 joint constraint</b></h3><p data-pid=\"HpSzeaws\">通常来说，约束是用于限制物体（刚体）的自由，包括碰撞接触、摩擦、弹簧、滑轮等等。而关节约束是一种特殊的约束，是2 个刚体相互作用的约束，可以很好的模拟门铰链、吊绳、生物关节等。这部分的原理可以参考<u><a href=\"https://link.zhihu.com/?target=https%3A//docs.nvidia.com/gameworks/content/gameworkslibrary/physx/guide/Manual/Joints.html\" class=\" wrap external\" target=\"_blank\" rel=\"nofollow noreferrer\">PhysX的Joints</a></u>（UE、Unity等很多游戏引擎用过或正在用Nvidia Physx作为物理方案，尽管UE5后更换为Chaos，一些基本物理相关的方法是基本不变的，使用起来变化也不大）。其中UE的约束组件是d6 joints，可以自由锁定、限制或放开三个维度的位移以及三个维度的旋转。通过限制，可以实现下面的PhysX中的Joints例子。</p><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-dba89a2efa12cae5dc47b87c60ff0442_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"944\" data-rawheight=\"256\" data-original-token=\"v2-5b80e3117e6f8a9dfe58be6d45220f4f\" class=\"origin_image zh-lightbox-thumb\" width=\"944\" data-original=\"https://pica.zhimg.com/v2-dba89a2efa12cae5dc47b87c60ff0442_r.jpg\"/><figcaption>PhysX中的Joints例子</figcaption></figure><p data-pid=\"SuZCBy2l\">在布娃娃模拟中，通常会使用关节约束以防止人物在模拟过程中关节发生过大，一般会模拟人类各部位的关节限制，使布娃娃更真实。</p><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-90a634ea8aa347930301818ee5ba6e8f_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"360\" data-rawheight=\"180\" data-original-token=\"v2-dc644393e9b615629b0ef955fbf01347\" class=\"content_image\" width=\"360\"/><figcaption>布娃娃的Bad case</figcaption></figure><p data-pid=\"-XzIm7-d\">为了方便，我们下文中就用约束指代关节约束，尽管严格上这两个概念是有区别的。</p><h3><b>关键帧动画与布娃娃物理融合</b></h3><p data-pid=\"UeIs9Nzw\">驱动我们的布娃娃到指定动画目标方式有很多，我们主要看UE5中最新的物理动画方案Physics Control（UE5.3版本）。UE中驱动布娃娃到指定动画pose，可以简单理解为即驱动布娃娃中部分的刚体及对应约束，可以通过约束中的线性马达linear drive和角马达angular drive实现，其中PhysX马达施加的力中可以抽象为以下公式：</p><p data-pid=\"KJ6vudot\">force = spring * (targetPosition - position) + damping * (targetVelocity - velocity)</p><p data-pid=\"dFET1iMo\">角马达有两种模式，一是扭转与摇摆twist and swing，另一个则是SLERP球面线性插值。这两种模式区别在于如何估算从当前朝向到目标朝向路径（或者说插值的方式），扭转与摇摆中他会将旋转分解为单独的扭转量和摇摆量，由这两个量来实现插值，比SLERP要直观的多，但当其驱动比如180度的摇摆量，马达则不会插值最短的弧线路径。而SLERP由于是使用四元数，则会遵循当前与目标的最短弧线路径。</p><p data-pid=\"2ieKpEK8\">下面的图就很直观的理解这两种角马达的方式，可以明显看出路径的不同（来自顽皮狗大佬周明伦的文章，大家也可以看他这篇帖子加强理解<u><a href=\"https://link.zhihu.com/?target=https%3A//www.gamedev.net/forums/topic/696882-swing-twist-interpolation-sterp-an-alternative-to-slerp/\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"><span class=\"invisible\">https://www.</span><span class=\"visible\">gamedev.net/forums/topi</span><span class=\"invisible\">c/696882-swing-twist-interpolation-sterp-an-alternative-to-slerp/</span><span class=\"ellipsis\"></span></a></u>）</p><p data-pid=\"DvEnuISq\">扭转与摇摆 twist and swing 分解图示：</p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-2ccf348a1c627523f700e5ab73f8be5c_1440w.gif\" data-size=\"normal\" data-rawwidth=\"400\" data-rawheight=\"200\" data-thumbnail=\"https://pic3.zhimg.com/v2-2ccf348a1c627523f700e5ab73f8be5c_b.jpg\" data-original-token=\"v2-2ccf348a1c627523f700e5ab73f8be5c\" class=\"content_image\" width=\"400\"/><figcaption>扭转与摇摆 twist and swing 分解图示</figcaption></figure><p data-pid=\"0YKLjY6o\">驱动朝向的路径示意（左边是SLERP，右边是扭转与摇摆 ）：</p><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-29970126996fbae89cf59ea73aaeff21_1440w.gif\" data-size=\"normal\" data-rawwidth=\"400\" data-rawheight=\"200\" data-thumbnail=\"https://picx.zhimg.com/v2-29970126996fbae89cf59ea73aaeff21_b.jpg\" data-original-token=\"v2-29970126996fbae89cf59ea73aaeff21\" class=\"content_image\" width=\"400\"/><figcaption>驱动朝向的路径示意（左边是SLERP，右边是扭转与摇摆 ）</figcaption></figure><p data-pid=\"arV1T-Vm\">而UE5中Physics Control中的角马达则是选择SLERP的方式，通过源码我们可以看到其关节约束初始化参数。</p><div class=\"highlight\"><pre><code class=\"language-cpp\"><span class=\"n\">FConstraintInstance</span><span class=\"o\">*</span> <span class=\"n\">FPhysicsControlRecord</span><span class=\"o\">::</span><span class=\"n\">CreateConstraint</span><span class=\"p\">(</span><span class=\"n\">UObject</span><span class=\"o\">*</span> <span class=\"n\">ConstraintDebugOwner</span><span class=\"p\">,</span> <span class=\"n\">FName</span> <span class=\"n\">ControlName</span><span class=\"p\">)</span>\n<span class=\"p\">{</span>\n<span class=\"err\">``````</span>\n\n\t<span class=\"n\">FBodyInstance</span><span class=\"o\">*</span> <span class=\"n\">ParentBody</span> <span class=\"o\">=</span> <span class=\"n\">UE</span><span class=\"o\">::</span><span class=\"n\">PhysicsControlComponent</span><span class=\"o\">::</span><span class=\"n\">GetBodyInstance</span><span class=\"p\">(</span>\n\t\t<span class=\"n\">PhysicsControl</span><span class=\"p\">.</span><span class=\"n\">ParentMeshComponent</span><span class=\"p\">,</span> <span class=\"n\">PhysicsControl</span><span class=\"p\">.</span><span class=\"n\">ParentBoneName</span><span class=\"p\">);</span>\n\t<span class=\"n\">FBodyInstance</span><span class=\"o\">*</span> <span class=\"n\">ChildBody</span> <span class=\"o\">=</span> <span class=\"n\">UE</span><span class=\"o\">::</span><span class=\"n\">PhysicsControlComponent</span><span class=\"o\">::</span><span class=\"n\">GetBodyInstance</span><span class=\"p\">(</span>\n\t\t<span class=\"n\">PhysicsControl</span><span class=\"p\">.</span><span class=\"n\">ChildMeshComponent</span><span class=\"p\">,</span> <span class=\"n\">PhysicsControl</span><span class=\"p\">.</span><span class=\"n\">ChildBoneName</span><span class=\"p\">);</span>\n\n<span class=\"err\">``````</span>\n\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">InitConstraint</span><span class=\"p\">(</span><span class=\"n\">ChildBody</span><span class=\"p\">,</span> <span class=\"n\">ParentBody</span><span class=\"p\">,</span> <span class=\"mf\">1.0f</span><span class=\"p\">,</span> <span class=\"n\">ConstraintDebugOwner</span><span class=\"p\">);</span>\n\n\t<span class=\"c1\">// Ensure the control point is set\n</span><span class=\"c1\"></span>\t<span class=\"n\">UpdateConstraintControlPoint</span><span class=\"p\">();</span>\n\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetLinearXMotion</span><span class=\"p\">(</span><span class=\"n\">ELinearConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">LCM_Free</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetLinearYMotion</span><span class=\"p\">(</span><span class=\"n\">ELinearConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">LCM_Free</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetLinearZMotion</span><span class=\"p\">(</span><span class=\"n\">ELinearConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">LCM_Free</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetAngularSwing1Motion</span><span class=\"p\">(</span><span class=\"n\">EAngularConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">ACM_Free</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetAngularSwing2Motion</span><span class=\"p\">(</span><span class=\"n\">EAngularConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">ACM_Free</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetAngularTwistMotion</span><span class=\"p\">(</span><span class=\"n\">EAngularConstraintMotion</span><span class=\"o\">::</span><span class=\"n\">ACM_Free</span><span class=\"p\">);</span>\n\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetLinearPositionDrive</span><span class=\"p\">(</span><span class=\"nb\">true</span><span class=\"p\">,</span> <span class=\"nb\">true</span><span class=\"p\">,</span> <span class=\"nb\">true</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetLinearVelocityDrive</span><span class=\"p\">(</span><span class=\"nb\">true</span><span class=\"p\">,</span> <span class=\"nb\">true</span><span class=\"p\">,</span> <span class=\"nb\">true</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetAngularDriveMode</span><span class=\"p\">(</span><span class=\"n\">EAngularDriveMode</span><span class=\"o\">::</span><span class=\"n\">SLERP</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetOrientationDriveSLERP</span><span class=\"p\">(</span><span class=\"nb\">true</span><span class=\"p\">);</span>\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetAngularVelocityDriveSLERP</span><span class=\"p\">(</span><span class=\"nb\">true</span><span class=\"p\">);</span>\n\n\t<span class=\"n\">ConstraintInstance</span><span class=\"o\">-&gt;</span><span class=\"n\">SetDisableCollision</span><span class=\"p\">(</span><span class=\"n\">PhysicsControl</span><span class=\"p\">.</span><span class=\"n\">ControlSettings</span><span class=\"p\">.</span><span class=\"n\">bDisableCollision</span><span class=\"p\">);</span>\n\n\t<span class=\"k\">return</span> <span class=\"n\">ConstraintInstance</span><span class=\"p\">;</span>\n<span class=\"p\">}</span>\n</code></pre></div><p data-pid=\"Ch8i0yNz\">因此让布娃娃物理融合关键帧动画，在Physics Control中每一帧会驱动各关节的约束到动画指定pose，这驱动是通过设置线性马达的目标位置、线速度以及角马达的目标朝向、角速度来实现的。源码中在这块做的操作：</p><div class=\"highlight\"><pre><code class=\"language-text\">void FPhysicsControlComponentImpl::ApplyControl(FPhysicsControlRecord&amp; Record)\n{\n······\n\n\t// Set strengths etc\n\tif (ApplyControlStrengths(Record, ConstraintInstance))\n\t{\n\t\tFTransform TargetTM;\n\t\tFVector TargetVelocity;\n\t\tFVector TargetAngularVelocity;\n\t\tCalculateControlTargetData(TargetTM, TargetVelocity, TargetAngularVelocity, Record, true);\n\n\t\tConstraintInstance-&gt;SetLinearPositionTarget(TargetTM.GetTranslation());\n\t\tConstraintInstance-&gt;SetAngularOrientationTarget(TargetTM.GetRotation());\n\t\tConstraintInstance-&gt;SetLinearVelocityTarget(TargetVelocity);\n\t\tConstraintInstance-&gt;SetAngularVelocityTarget(TargetAngularVelocity / UE_TWO_PI); // In rev/sec\n\n\t\tif (ParentBodyInstance)\n\t\t{\n\t\t\tParentBodyInstance-&gt;WakeInstance();\n\t\t}\n\t\tif (ChildBodyInstance)\n\t\t{\n\t\t\tChildBodyInstance-&gt;WakeInstance();\n\t\t}\n\t}\n}</code></pre></div><p data-pid=\"2yRDJfTj\">另外，Physics Control中其提供世界空间World space和父级空间Parent space的驱动控制，关键区别在于每个关节驱动至pose目标时候是否考虑其父级关节。下图是我的模拟示意，左边是世界空间控制的物理动画，右边是父级空间，当同样被正方体给撞到时候，表现差异是很大的，世界空间每个关节会独立的驱动到动画目标（红色透明人为原动画目标）。不同关节可以选择不同的空间，并可以自由搭配，这是和使用场景是有关的。这块后面会具体讲。</p><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-287c323dddfe6a58021d6af1f840ec03_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1055\" data-rawheight=\"1036\" data-original-token=\"v2-61ba8f6d7f83bd783b90b82a7529386d\" class=\"origin_image zh-lightbox-thumb\" width=\"1055\" data-original=\"https://picx.zhimg.com/v2-287c323dddfe6a58021d6af1f840ec03_r.jpg\"/><figcaption>不同空间系的区别，左边是世界空间控制的物理动画，右边是父级空间</figcaption></figure><h3><b>其他分享的实现方案</b></h3><p data-pid=\"2NEc6Tl_\">其他网上分享的角色物理动画方案和UE这套有很多相同之处，通过看他们的经验对我们掌控UE这套有很大的帮助。</p><p data-pid=\"j1xabUNr\"><b>顽皮狗的GDC 2017演讲关于神秘海域4的物理动画：</b></p><p data-pid=\"UTPVicLn\">抽象为两个驱动方式，虽然和UE物理引擎不同（用的是Havok），底层的实现和细节多少有点不同，但在一些场景下模拟效果所需的方式是很像的，很有借鉴意义。<a href=\"https://link.zhihu.com/?target=https%3A//www.youtube.com/watch%3Fv%3D7S-_vuoKgR4\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"><span class=\"invisible\">https://www.</span><span class=\"visible\">youtube.com/watch?</span><span class=\"invisible\">v=7S-_vuoKgR4</span><span class=\"ellipsis\"></span></a></p><table data-draft-node=\"block\" data-draft-type=\"table\" data-size=\"normal\" data-row-style=\"normal\"><tbody><tr><td>方式</td><td>空间</td><td>优点</td><td>缺点</td></tr><tr><td>Powered Constraint Controller 驱动式约束控制器 (也叫Motor马达）</td><td>作用于Local Space局部空间（同上文的父级空间）</td><td>很真实，特别在模拟死亡的时候。</td><td>有时候很难匹配动画目标pose，有时候会过度及发生非预期振动</td></tr><tr><td>Rigid body controller 刚体控制器（也叫Keyframe controller 关键帧控制器）</td><td>作用于World space世界空间</td><td>用于活的角色有更好表现，容易匹配动画目标，非常稳定</td><td>有时候没有上面的方案真实，比如头被撞的时候，手部还是想维持原位</td></tr></tbody></table><p data-pid=\"ugvjvuLS\">其中Keyframe controller作者也给出了伪代码，原理上是设置线性速度，但如何插值速度是和位置、加速度等有关。</p><p class=\"ztext-empty-paragraph\"><br/></p><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-e6e1555eb82e9d95c1c3a0d18c321dab_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"2138\" data-rawheight=\"554\" data-original-token=\"v2-60be98e0a3aa4bb8edaaa0fd09c426df\" class=\"origin_image zh-lightbox-thumb\" width=\"2138\" data-original=\"https://pic2.zhimg.com/v2-e6e1555eb82e9d95c1c3a0d18c321dab_r.jpg\"/></figure><p class=\"ztext-empty-paragraph\"><br/></p><p data-pid=\"UNpHmvAb\"><b>GDC2020演讲-星球大战绝地:幸存者中的物理动画</b>：</p><p data-pid=\"W_D1_Zsu\">抽象为三种方式，在不同场景下单独或搭配使用，这里可以看视频他的介绍：<u><a href=\"https://link.zhihu.com/?target=https%3A//www.youtube.com/watch%3Fv%3DTmAU8aPekEo%26t%3D330s\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"><span class=\"invisible\">https://www.</span><span class=\"visible\">youtube.com/watch?</span><span class=\"invisible\">v=TmAU8aPekEo&amp;t=330s</span><span class=\"ellipsis\"></span></a></u></p><table data-draft-node=\"block\" data-draft-type=\"table\" data-size=\"normal\" data-row-style=\"normal\"><tbody><tr><td>方式</td><td>空间</td></tr><tr><td>Motors 马达（同关节约束中的马达）</td><td>作用于Local Space局部空间（同上文的父级空间）</td></tr><tr><td>Velocities速度（和神秘海域的keyframe controller有点像）</td><td>作用于World space世界空间</td></tr><tr><td>Constraints约束，和马达不同是世界空间，可以理解为物理状态的部位和目标动画的部位之间建立约束</td><td>作用于World space世界空间</td></tr></tbody></table><p data-pid=\"C8RL_fsR\">作者在攀爬悬挂梁案例使用了velocity drive速度马达，能提供稳定的移动表现，也提供了伪代码，在插值速度的时候考虑了位置因素。</p><figure data-size=\"normal\"><img src=\"https://pica.zhimg.com/v2-018f0bdb30bcc559f7bd82db02b96a7e_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"1632\" data-rawheight=\"626\" data-original-token=\"v2-cdf87a73507d929e923390f08e31a66b\" class=\"origin_image zh-lightbox-thumb\" width=\"1632\" data-original=\"https://pica.zhimg.com/v2-018f0bdb30bcc559f7bd82db02b96a7e_r.jpg\"/></figure><p data-pid=\"26ZZgabd\">还有一个分享是GDC2018EA在物理动画的分享，比起前两个分享，他们更注重运用于sport games的物理动画案例，等我有空总结一下这篇。<u><a href=\"https://link.zhihu.com/?target=https%3A//www.gdcvault.com/play/1025210/Physics-Driven-Ragdolls-and-Animation\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"><span class=\"invisible\">https://www.</span><span class=\"visible\">gdcvault.com/play/10252</span><span class=\"invisible\">10/Physics-Driven-Ragdolls-and-Animation</span><span class=\"ellipsis\"></span></a></u></p><h3><b>Physics Control中参数调整</b></h3><h3><b>Control 控制</b></h3><p data-pid=\"L0COJuST\">Physics Control中暴露给上层一些可供调整的参数，在调节无论是世界空间还是父级空间中都是通用的：</p><table data-draft-node=\"block\" data-draft-type=\"table\" data-size=\"normal\" data-row-style=\"normal\"><tbody><tr><td>名称</td><td>含义</td></tr><tr><td>Linear Strength 线性强度</td><td>驱动线性运动的强度</td></tr><tr><td>Linear Damping Ratio 线性阻尼比例</td><td>与线性强度密切相关的阻尼量，值越大，线性驱动越平滑和更惰性，值越小则驱动到目标更快，但会带来摇摆现象。</td></tr><tr><td>Linear Extra Damping 线性额外阻尼</td><td>额外的线性阻尼，在线性强度为0的时候又想有更多阻尼量，调节额外阻尼会变得实用。</td></tr><tr><td>Max Force 最大力</td><td>允许线性运动驱动的最大力，0为无限制</td></tr><tr><td>Angular Strength 角强度</td><td>驱动角运动的强度</td></tr><tr><td>Angular Damping Ratio 角阻尼比例</td><td>与角强度密切相关的阻尼量，值越大，角驱动越平滑和更惰性，值越小则驱动到目标更快，但会带来摇摆现象。</td></tr><tr><td>Angular Extra Damping 角额外阻尼</td><td>额外的角阻尼，在角强度为0的时候又想有更多阻尼量，调节额外阻尼会变得实用。</td></tr><tr><td>Max Torque 最大扭矩力</td><td>允许角运动驱动的最大扭矩力，0为无限制</td></tr></tbody></table><p data-pid=\"0USfQQbo\">通过Create Controls and Body Modifiers from Limb Bones节点可以为角色快速配置物理动画，其中</p><figure data-size=\"normal\"><img src=\"https://picx.zhimg.com/v2-6aa9cd79a9f457d16819a2b2a4a41639_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"978\" data-rawheight=\"702\" data-original-token=\"v2-e7744e191b07aa024afaa67a10df2879\" class=\"origin_image zh-lightbox-thumb\" width=\"978\" data-original=\"https://picx.zhimg.com/v2-6aa9cd79a9f457d16819a2b2a4a41639_r.jpg\"/></figure><table data-draft-node=\"block\" data-draft-type=\"table\" data-size=\"normal\" data-row-style=\"normal\"><tbody><tr><td>节点</td><td>含义</td></tr><tr><td>Skeletal Mesh Component 骨骼网格体组件</td><td>-</td></tr><tr><td>Limb Setup Data 肢体配置</td><td>配置启用Physics Control的肢体集，通过设Start Bone Name会为其本身和子骨骼配置成肢体limb。</td></tr><tr><td>World Space Control Data 世界空间控制配置</td><td>参考上一个表</td></tr><tr><td>World Space Control Settings 世界空间控制更多设置</td><td>Skeletal Animation Velocity Multiplier 动画的速率乘积Use Skeletal Animation 是否用骨骼网格体的动画来驱动Disable Collision 是否关闭body部位之间的碰撞Auto Disable 开了之后则会在每个tick的最后自动关闭control</td></tr><tr><td>Enable World Space Controls 初始开启世界空间控制</td><td>初始默认开启世界空间控制，如果没有开后面也可以随时开</td></tr><tr><td>Parent Space Control Data 父级空间控制配置</td><td>参考上一个表</td></tr><tr><td>Parent Space Control Settings 父级空间控制更多设置</td><td>Skeletal Animation Velocity Multiplier 动画的速率乘积Use Skeletal Animation 是否用骨骼网格体的动画来驱动Disable Collision 是否关闭body部位之间的碰撞Auto Disable 开了之后则会在每个tick的最后自动关闭control</td></tr><tr><td>Enable Parent Space Controls 初始开启父级空间控制</td><td>初始默认开启父级空间控制，如果没有开后面也可以随时开</td></tr><tr><td>Physics Movement Type 初始移动状态</td><td>三种状态static/kinematic/simulated，static则是维持部位初始状态，不受动画驱动也没有物理模拟，kinematic是完全跟随动画目标pose（其部位也自动关闭碰撞），simulated是融合动画驱动和物理模拟</td></tr><tr><td>Gravity Multiplier 受重力影响系数</td><td>受重力影响的系数，0为无重力，1为正常受重力，Ragdoll状态下则会设为1</td></tr><tr><td>Physics Blend Weight 物理融合权重</td><td>定部位动画目标pose和物理模拟状态的融合比例</td></tr></tbody></table><h3><b>Body Modifiers 物理形体修饰器</b></h3><p data-pid=\"rV31zxdH\">Physics Control中还有个概念叫Body Modifiers，暂且翻译它叫物理形体修饰器吧，这是physics control为了方便用户更直观方便各物理形体的物理模拟参数而封装的接口概念。比如它可以控制角色某个关节的受重力状态、是否开启物理模拟、与动画的混合权重等。通过这块加世界空间World space控制、父级空间Parent space control控制，我们可以靠这套组件接口，实现各式各样场景的物理动画效果。</p><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-270a7a1d3c2b086fd471a049010c68ef_1440w.gif\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"499\" data-rawheight=\"340\" data-thumbnail=\"https://pic2.zhimg.com/v2-270a7a1d3c2b086fd471a049010c68ef_b.jpg\" data-original-token=\"v2-270a7a1d3c2b086fd471a049010c68ef\" class=\"origin_image zh-lightbox-thumb\" width=\"499\" data-original=\"https://pic2.zhimg.com/v2-270a7a1d3c2b086fd471a049010c68ef_r.jpg\"/></figure><p data-pid=\"mu7dyjDK\">以下列举Body Modifiers一些关键函数，这里为了方便直接把body简单称作部位。</p><ol><li data-pid=\"P5AnSiSU\">Set Body Modifier Collision Type</li></ol><p data-pid=\"nKKK2nrW\">可以控制部位是否受物理碰撞影响。</p><p data-pid=\"bQx1iDDh\">2. Set Body Modifier Gravity Multiplier</p><p data-pid=\"atnjbaCD\">控制部位受重力影响的系数，0为无重力，1为正常受重力，Ragdoll状态下则会设为1。</p><p data-pid=\"qdQ8EJdr\">3. Set Body Modifier Kinematic Target</p><p data-pid=\"0CIbXowv\">单独控制部位目标位置和朝向，可以理解播角色动画的过程是实时更新这个函数。</p><p data-pid=\"rfTIjFnb\">4. Set Body Modifier Movement Type</p><p data-pid=\"-G6xy2RT\">控制部位移动状态，有三种状态static/kinematic/simulated（这个和神秘海域GDC分享中是类似的），其中static则是维持部位初始状态，不受动画驱动也没有物理模拟，kinematic是完全跟随动画目标pose（其部位也自动关闭碰撞），simulated是融合动画驱动和物理模拟。</p><p data-pid=\"B554Mjuq\">5. Set Body Modifier Physics Blend Weight</p><p data-pid=\"IHXISh3D\">控制指定部位动画目标pose和物理模拟状态的融合比例，在实现一些场景中特别实用。星球大战GDC分享了很多case，可以看看。</p><p data-pid=\"ioYA1j27\">6. Set Body Modifier Update Kinematic from Simulation</p><p data-pid=\"IMVE-hGG\">控制部位是否从物理模拟中更新动力学目标。</p><p data-pid=\"soQ_45BB\">7. Set Body Modifier Use Skeletal Animation</p><p data-pid=\"OCsfm6z-\">控制部位是否使用骨骼网格体动画作为驱动目标</p><h3><b>更多用途</b></h3><p data-pid=\"lkafJMXB\">Physics Control不止是控制角色物理动画，其本身的作用是控制一个物理形体相对于另一个的运动关系，角色物理动画只是其中一个应用（也是比较复杂的，由众多控制关系组成），UE官方在其频道更新了一个通过Physics Control实现与狗狗的互动，做了很多很好的展示，比如像手吸回木棍也能通过Physics Control来控制：<u><a href=\"https://link.zhihu.com/?target=https%3A//www.bilibili.com/video/BV1Bo4y1b7cH/%3Fspm_id_from%3D333.999.0.0%26vd_source%3D683aa4497cd7f6182be3f25c5e6eacb0\" class=\" external\" target=\"_blank\" rel=\"nofollow noreferrer\"><span class=\"invisible\">https://www.</span><span class=\"visible\">bilibili.com/video/BV1B</span><span class=\"invisible\">o4y1b7cH/?spm_id_from=333.999.0.0&amp;vd_source=683aa4497cd7f6182be3f25c5e6eacb0</span><span class=\"ellipsis\"></span></a></u></p><figure data-size=\"normal\"><img src=\"https://pic3.zhimg.com/v2-000aa3f8db4354a13c987258fc4044f6_1440w.jpg\" data-caption=\"\" data-size=\"normal\" data-rawwidth=\"720\" data-rawheight=\"384\" data-original-token=\"v2-0e6ff3e6a9085622cd12e4744054d819\" class=\"origin_image zh-lightbox-thumb\" width=\"720\" data-original=\"https://pic3.zhimg.com/v2-000aa3f8db4354a13c987258fc4044f6_r.jpg\"/></figure><p data-pid=\"9eo6OyJ1\">我关注UE做这块很久，我从最早的Physical Animation到5.1开始更新Physics Control的第一版，看到Epic在不断的完善，顶层进行易理解的抽象，尽量避免用户做太多复杂的配置操作等，也持续在迭代内容示例Content Examples，给了我们很多学习资源。虽然现在Physics Control在UE5.3仍然是实验版插件，但已经离成熟不远了。</p><p data-pid=\"415GdQN6\">但可惜的是想要做到合适的效果依然需要大量的人力调试，是有点低效的，不同场景的case差异又很大（比如在滑行和攀爬就是很大不同的场景）。这块只能寄希望与学术界可以真正搞出一套工业界可以落地的物理动画方案，使用真正模拟人类关节的力驱动来做出动画动作，而不是通过序列帧的方式，然后通过机器学习的方式来学习关节运动做出合格的动画。只有真正模拟了关节物理运动方式，才是最终的解决方案。这大概也是DeepMimic等一众文章的愿景吧。</p><p data-pid=\"i2ANUYu3\">另外以上接口都另外暴露了批量设置的接口，可以很干净的集体控制若干个部位。（源码中只是做了for each挨个执行）</p><h2><b>总结</b></h2><p data-pid=\"6rc4KIvH\">使用Physics Control，通过配置角色各关节的各项详细参数（包括物理资产、Control、Body Modifiers），即可实现动画与物理状态融合的效果，后续会更新一篇我自己一些实践心得，目录如下：（详细的给自己挖坑中）</p><ol><li data-pid=\"J-XcYfHp\">配置Physics Control的基本步骤</li><li data-pid=\"QXf9unrv\">如何配置好角色物理资产（碰撞体/关节约束）</li><li data-pid=\"ql1Ou-18\">一些官方/经典案例复原</li><li data-pid=\"9rf8FZxU\">如何做到Party Game那种的物理动画</li><li data-pid=\"zgBjY-WU\">还有更多应用？</li></ol><figure data-size=\"normal\"><img src=\"https://pic2.zhimg.com/v2-089a12bbff6d50a000623ea014e767ad_1440w.jpg\" data-size=\"normal\" data-rawwidth=\"1456\" data-rawheight=\"1246\" data-original-token=\"v2-f26856fd5ca483d5d3890e28435389d0\" class=\"origin_image zh-lightbox-thumb\" width=\"1456\" data-original=\"https://pic2.zhimg.com/v2-089a12bbff6d50a000623ea014e767ad_r.jpg\"/><figcaption>不完全总结</figcaption></figure><p data-pid=\"NbLui1K0\">工作比较忙，写的时间比较紧，这篇文章我还会持续补充完善，有错误和疏漏地方还请大佬们指正，也欢迎随时和我讨论。</p>", "contentNeedTruncated": false, "forceLoginWhenClickReadMore": false, "adminClosedComment": false, "topics": [{"url": "https://www.zhihu.com/api/v4/topics/21291841", "type": "topic", "id": "21291841", "name": "虚幻 5 （游戏引擎）"}, {"url": "https://www.zhihu.com/api/v4/topics/20052447", "type": "topic", "id": "20052447", "n
